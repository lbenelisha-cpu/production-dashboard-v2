<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח בקרה — ייצור ואריזה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
html, body { margin:0; padding:0; background:#14171A; }
#prod-dash-root, #prod-dash-root * { box-sizing: border-box; }
#prod-dash-root {
  --bg: #14171A;
  --panel: #1D2226;
  --panel-2: #242A2F;
  --border: #2D3439;
  --text: #ECEEF0;
  --text-muted: #8D969E;
  --amber: #F4A623;
  --amber-soft: rgba(244,166,35,0.14);
  --teal: #36C2B4;
  --teal-soft: rgba(54,194,180,0.14);
  --green: #4CAF6D;
  --yellow: #E8C547;
  --red: #E1543F;
  --radius: 12px;
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  border-radius: 16px;
  padding: 0;
  min-height: 100%;
  line-height: 1.4;
}
#prod-dash-root .wrap { padding: 18px; max-width: 1180px; margin: 0 auto; }

/* Topbar */
#prod-dash-root .topbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  padding-bottom: 16px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
#prod-dash-root .brand { display: flex; align-items: center; gap: 12px; }
#prod-dash-root .brand-mark {
  width: 38px; height: 38px; border-radius: 9px;
  background: linear-gradient(135deg, var(--amber), #c97e0c);
  display:flex; align-items:center; justify-content:center;
  font-weight: 900; color: #1a1300; font-size: 18px;
  box-shadow: 0 0 0 1px rgba(244,166,35,0.35), 0 4px 14px rgba(244,166,35,0.18);
}
#prod-dash-root .brand h1 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: 0.2px; }
#prod-dash-root .brand p { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); }
#prod-dash-root .storage-status { font-size: 11px; font-weight: 700; }
#prod-dash-root .storage-status.ok { color: var(--green); }
#prod-dash-root .storage-status.warn { color: var(--yellow); }
/* Facility drill-down overlay */
#prod-dash-root .facility-drilldown-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 990;
  overflow-y: auto; direction: rtl;
  display: none;
}
#prod-dash-root .facility-drilldown-overlay.open { display: block; }
#prod-dash-root .facility-drilldown-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--panel); border-bottom: 2px solid var(--border);
  padding: 14px 18px; display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap;
}
#prod-dash-root .facility-drilldown-header h2 { margin: 0; font-size: 18px; font-weight: 900; }
#prod-dash-root .facility-drilldown-header .kpi-sub { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); }
#prod-dash-root .back-btn {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-right: auto;
}
#prod-dash-root .back-btn:hover { border-color: var(--amber); color: var(--amber); }
#prod-dash-root .drilldown-body { padding: 18px; max-width: 1180px; margin: 0 auto; }
#prod-dash-root .gauge-card.clickable-gauge { cursor: pointer; transition: transform .12s, border-color .12s; }
#prod-dash-root .gauge-card.clickable-gauge:hover { transform: translateY(-2px); border-color: var(--amber); box-shadow: 0 0 0 1px rgba(244,166,35,0.3); }
#prod-dash-root .shift-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
@media(max-width:640px){ #prod-dash-root .shift-grid { grid-template-columns: 1fr; } }
#prod-dash-root .drilldown-stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
@media(max-width:760px){ #prod-dash-root .drilldown-stat-grid { grid-template-columns: repeat(2,1fr); } }
#prod-dash-root .topbar-actions { display:flex; align-items:center; gap:8px; }
#prod-dash-root .ghost-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 8px; padding: 7px 11px; font-size: 12px; cursor: pointer; font-family: inherit;
}
#prod-dash-root .ghost-btn:hover { border-color: var(--red); color: var(--red); }

#prod-dash-root .ghost-btn.whatsapp-btn {
  border-color: #25D366;
  color: #25D366;
}
#prod-dash-root .ghost-btn.whatsapp-btn:hover {
  background: rgba(37,211,102,0.12);
  border-color: #25D366;
  color: #25D366;
}


/* Tabs */
#prod-dash-root .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
#prod-dash-root .tab-btn {
  font-family: inherit; cursor: pointer; border: 1px solid var(--border);
  background: var(--panel); color: var(--text-muted);
  padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  transition: all .15s ease;
}
#prod-dash-root .tab-btn:hover { color: var(--text); }
#prod-dash-root .tab-btn.active {
  background: var(--amber-soft); border-color: var(--amber); color: var(--amber);
}

/* Facility filter */
#prod-dash-root .facility-bar { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
#prod-dash-root .facility-label { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-left: 4px; }
#prod-dash-root .facility-chip {
  font-family: 'JetBrains Mono', monospace; cursor: pointer; border: 1px solid var(--border);
  background: var(--panel); color: var(--text-muted);
  padding: 6px 13px; border-radius: 999px; font-size: 12.5px; font-weight: 700;
}
#prod-dash-root .facility-chip:hover { color: var(--text); }
#prod-dash-root .facility-chip.active { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
#prod-dash-root .facility-chip.all-chip { font-family: 'Heebo', sans-serif; }

/* Filter bar */
#prod-dash-root .filter-bar {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap;
}
#prod-dash-root .field { display: flex; flex-direction: column; gap: 5px; }
#prod-dash-root .field label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
#prod-dash-root .field input, #prod-dash-root .field select {
  font-family: inherit; background: var(--panel-2); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; padding: 7px 9px; font-size: 13px; min-width: 110px;
}
#prod-dash-root .field input:focus, #prod-dash-root .field select:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
#prod-dash-root .small-link-btn {
  background: none; border: none; color: var(--amber); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit; padding: 7px 2px; text-decoration: underline; text-underline-offset: 3px;
}

/* KPI grid */
#prod-dash-root .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
#prod-dash-root .kpi-grid.mode-2col { grid-template-columns: repeat(2, 1fr); max-width: 480px; margin: 0 auto 16px; }
@media (max-width: 760px) { #prod-dash-root .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
#prod-dash-root .insight-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
@media (max-width: 760px) { #prod-dash-root .insight-stats { grid-template-columns: repeat(1, 1fr); } }
#prod-dash-root .kpi-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; position: relative; overflow: hidden;
}
#prod-dash-root .kpi-card.num::before {
  content: ""; position: absolute; top:0; right:0; left:0; height: 3px;
}
#prod-dash-root .kpi-card.num.production::before { background: var(--amber); }
#prod-dash-root .kpi-card.num.packaging::before { background: var(--teal); }
#prod-dash-root .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: .3px; margin-bottom: 8px; }
#prod-dash-root .kpi-num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1; direction: ltr; display: block; text-align: right; }
#prod-dash-root .kpi-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 7px; }
#prod-dash-root .gauge-card { display: flex; flex-direction: column; align-items: center; padding: 10px 10px 14px; }
#prod-dash-root .gauge-svg { width: 100%; max-width: 190px; }
#prod-dash-root .gauge-pct { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
#prod-dash-root .gauge-name { font-size: 12.5px; font-weight: 700; margin-top: 2px; }
#prod-dash-root .gauge-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; direction: ltr; }
#prod-dash-root .gauge-delta { font-size: 12px; font-weight: 600; margin-top: 4px; }

/* Chart panel */
#prod-dash-root .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
#prod-dash-root .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
#prod-dash-root .panel-title { font-size: 14px; font-weight: 800; }
#prod-dash-root .legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--text-muted); }
#prod-dash-root .legend span { display: inline-flex; align-items: center; gap: 6px; }
#prod-dash-root .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
#prod-dash-root .chart-wrap { direction: ltr; overflow-x: auto; }
#prod-dash-root .chart-empty, #prod-dash-root .table-empty {
  text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px 10px;
}

/* Table */
#prod-dash-root .table-scroll { overflow-x: auto; }
#prod-dash-root table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 1220px; }
#prod-dash-root thead th {
  text-align: right; color: var(--text-muted); font-weight: 700; font-size: 11px;
  border-bottom: 1px solid var(--border); padding: 8px 8px; white-space: nowrap;
}
#prod-dash-root tbody td { padding: 8px 8px; border-bottom: 1px solid rgba(45,52,57,0.6); white-space: nowrap; }
#prod-dash-root tbody tr:hover { background: var(--panel-2); }
#prod-dash-root .mono { font-family: 'JetBrains Mono', monospace; direction: ltr; display: inline-block; }
#prod-dash-root .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 700; }
#prod-dash-root .pill.ok { background: rgba(76,175,109,0.15); color: var(--green); }
#prod-dash-root .pill.warn { background: rgba(232,197,71,0.15); color: var(--yellow); }
#prod-dash-root .pill.bad { background: rgba(225,84,63,0.15); color: var(--red); }
#prod-dash-root .row-del {
  background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px;
  width: 24px; height: 24px; cursor: pointer; font-size: 12px; line-height: 1;
}
#prod-dash-root .row-del:hover { border-color: var(--red); color: var(--red); }

/* Actions */
#prod-dash-root .actions-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
#prod-dash-root .btn {
  display: inline-block; font-family: inherit; cursor: pointer; border-radius: 9px; padding: 10px 18px; font-size: 13.5px; font-weight: 700; border: none;
}
#prod-dash-root .btn.primary { background: var(--amber); color: #1a1300; }
#prod-dash-root .btn.primary:hover { background: #ffb842; }
#prod-dash-root .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
#prod-dash-root .btn.secondary:hover { border-color: var(--teal); color: var(--teal); }
#prod-dash-root .file-hint { font-size: 11.5px; color: var(--text-muted); }
#prod-dash-root .file-hint button { background: none; border: none; color: var(--teal); text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 11.5px; padding: 0; }

/* Modal */
#prod-dash-root .modal-overlay {
  position: fixed; inset: 0; background: rgba(8,9,10,0.65); display: none;
  align-items: center; justify-content: center; z-index: 999; padding: 16px;
}
#prod-dash-root .modal-overlay.open { display: flex; }
#prod-dash-root .modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
}
#prod-dash-root .modal h3 { margin: 0 0 14px; font-size: 16px; font-weight: 800; }
#prod-dash-root .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
#prod-dash-root .modal-grid .field.full { grid-column: 1 / -1; }
#prod-dash-root .modal-grid input, #prod-dash-root .modal-grid select, #prod-dash-root .modal-grid textarea {
  font-family: inherit; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 7px; padding: 8px 9px; font-size: 13px; width: 100%;
}
#prod-dash-root .modal-grid textarea { resize: vertical; min-height: 50px; }
#prod-dash-root .modal-grid input.field-error, #prod-dash-root .modal-grid select.field-error {
  border-color: var(--red); box-shadow: 0 0 0 1px rgba(225,84,63,0.35);
}
#prod-dash-root .modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

/* Toast */
#prod-dash-root .toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 1000;
  opacity: 0; transition: all .25s ease; pointer-events: none; white-space: nowrap;
}
#prod-dash-root .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#prod-dash-root .toast.err { border-color: var(--red); color: var(--red); }
#prod-dash-root .empty-state {
  text-align: center; padding: 50px 20px; color: var(--text-muted);
}
#prod-dash-root .empty-state h3 { color: var(--text); font-size: 16px; margin-bottom: 6px; }
#prod-dash-root .shared-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
#prod-dash-root .print-only { display: none; }

#prod-dash-root .quality-badge {
  display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 800;
}
#prod-dash-root .quality-badge.ok { background: rgba(76,175,109,0.15); color: var(--green); }
#prod-dash-root .quality-badge.conditional { background: rgba(232,197,71,0.15); color: var(--yellow); }
#prod-dash-root .quality-badge.bad { background: rgba(225,84,63,0.15); color: var(--red); }
#prod-dash-root .quality-row-bad { background: rgba(225,84,63,0.08); }
#prod-dash-root .quality-row-conditional { background: rgba(232,197,71,0.08); }


#prod-dash-root .advanced-summary { display: none; margin-bottom: 16px; }
#prod-dash-root .advanced-summary.open { display: block; }
#prod-dash-root .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
#prod-dash-root .summary-grid.three { grid-template-columns: repeat(3, 1fr); }
#prod-dash-root .summary-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
}
#prod-dash-root .summary-card .label { font-size: 11px; color: var(--text-muted); font-weight: 800; margin-bottom: 7px; }
#prod-dash-root .summary-card .value { font-family: 'JetBrains Mono', monospace; direction:ltr; font-size: 26px; font-weight: 800; text-align:right; }
#prod-dash-root .summary-card .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 6px; }
#prod-dash-root .mini-bars { display:flex; flex-direction:column; gap:9px; }
#prod-dash-root .mini-bar-row { display:grid; grid-template-columns: 150px 1fr 82px; align-items:center; gap:10px; font-size:12px; }
#prod-dash-root .mini-bar-track { height:10px; border-radius:999px; background:var(--panel-2); overflow:hidden; border:1px solid var(--border); }
#prod-dash-root .mini-bar-fill { height:100%; border-radius:999px; background:var(--teal); min-width:2px; }
#prod-dash-root .trend-line { width:100%; min-width:520px; direction:ltr; }
@media (max-width: 900px) { #prod-dash-root .summary-grid, #prod-dash-root .summary-grid.three { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { #prod-dash-root .summary-grid, #prod-dash-root .summary-grid.three { grid-template-columns: 1fr; } #prod-dash-root .mini-bar-row { grid-template-columns: 110px 1fr 70px; } }


#prod-dash-root .clickable-kpi { cursor:pointer; transition: transform .12s ease, border-color .12s ease; }
#prod-dash-root .clickable-kpi:hover { transform: translateY(-1px); border-color: var(--teal); }
#prod-dash-root .clickable-kpi.active { border-color: var(--amber); box-shadow: 0 0 0 1px rgba(244,166,35,0.35); }
#prod-dash-root .panel-toggle-btn { background: var(--panel-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 12px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:800; }
#prod-dash-root .panel-toggle-btn:hover { border-color: var(--teal); color: var(--teal); }
#prod-dash-root .event-card { cursor:pointer; }
#prod-dash-root .event-card:hover { border-color: var(--amber); transform: translateY(-1px); }
#prod-dash-root .event-type-quality { color: var(--red); font-weight:800; }
#prod-dash-root .event-type-env { color: var(--teal); font-weight:800; }




/* WhatsApp high quality snapshot */
#prod-dash-root .wa-shot {
  position: fixed;
  left: -99999px;
  top: 0;
  width: 1080px;
  min-height: 1350px;
  background: #14171A;
  color: var(--text);
  padding: 34px;
  border-radius: 0;
  direction: rtl;
  font-family: 'Heebo', sans-serif;
}
#prod-dash-root .wa-shot-head {
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  padding-bottom:18px; border-bottom:2px solid var(--border); margin-bottom:22px;
}
#prod-dash-root .wa-shot-logo { display:flex; align-items:center; gap:14px; }
#prod-dash-root .wa-shot-logo .mark {
  width:62px; height:62px; border-radius:14px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--amber),#c97e0c); color:#1a1300; font-weight:900; font-size:26px;
}
#prod-dash-root .wa-shot h2 { margin:0; font-size:30px; line-height:1.1; }
#prod-dash-root .wa-shot .meta { color:var(--text-muted); font-size:16px; margin-top:6px; }
#prod-dash-root .wa-shot-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
#prod-dash-root .wa-shot-card {
  background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:18px;
  min-height:126px; box-shadow:0 8px 24px rgba(0,0,0,.18);
}
#prod-dash-root .wa-shot-card .label { color:var(--text-muted); font-size:15px; font-weight:800; margin-bottom:10px; }
#prod-dash-root .wa-shot-card .value { font-family:'JetBrains Mono', monospace; direction:ltr; text-align:right; font-size:33px; font-weight:900; line-height:1; }
#prod-dash-root .wa-shot-card .sub { color:var(--text-muted); font-size:13px; margin-top:10px; }
#prod-dash-root .wa-shot-section { background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:18px; }
#prod-dash-root .wa-shot-section-title { font-size:20px; font-weight:900; margin-bottom:12px; }
#prod-dash-root .wa-shot-bars { display:flex; flex-direction:column; gap:12px; }
#prod-dash-root .wa-shot-bar-row { display:grid; grid-template-columns:210px 1fr 130px; align-items:center; gap:14px; font-size:16px; }
#prod-dash-root .wa-shot-track { height:16px; border-radius:999px; background:var(--panel-2); border:1px solid var(--border); overflow:hidden; }
#prod-dash-root .wa-shot-fill { height:100%; border-radius:999px; background:var(--teal); min-width:3px; }
#prod-dash-root .wa-shot-footer { color:var(--text-muted); font-size:13px; text-align:center; margin-top:8px; }

#prod-dash-root .wa-preview {
  white-space: pre-wrap;
  direction: rtl;
  text-align: right;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-size: 13px;
  max-height: 300px;
  overflow: auto;
}



@media print {
  html, body { background: #fff !important; }
  #prod-dash-root {
    --bg: #fff; --panel: #fff; --panel-2: #f3f3f3; --border: #ccc;
    --text: #111; --text-muted: #555;
  }
  #prod-dash-root .topbar-actions, #prod-dash-root .tabs, #prod-dash-root .facility-bar,
  #prod-dash-root .filter-bar, #prod-dash-root .actions-row, #prod-dash-root .shared-note,
  #prod-dash-root .modal-overlay, #prod-dash-root .toast, #prod-dash-root .brand-mark {
    display: none !important;
  }
  #prod-dash-root .print-only { display: block; }
  #prod-dash-root table th:last-child, #prod-dash-root table td:last-child { display: none; }
  #prod-dash-root .panel, #prod-dash-root .kpi-card { border: 1px solid #ccc; box-shadow: none; }
  #prod-dash-root .wrap { max-width: 100%; }
}
</style>
</head>
<body>
<div id="prod-dash-root" dir="rtl" lang="he"></div><input type="file" id="qualityFileInput" accept=".xlsx,.xls,.csv" style="display:none;">
<script>
(function(){
  const root = document.getElementById('prod-dash-root');

  // אחסון שיתופי: כל המשתמשים שנכנסים לאתר רואים ועורכים את אותם נתונים.
  // הנתונים נשמרים בפועל בצד השרת (Netlify Function + Netlify Blobs), לא בדפדפן.
  // אם הפונקציה לא זמינה (למשל פתיחת הקובץ ישירות בלי Netlify) — חוזרים אוטומטית ל-localStorage המקומי כגיבוי.
  const STORAGE_API_URL = '/.netlify/functions/storage';
  let _sharedStorageAvailable = null; // null=לא נבדק עדיין, true/false=תוצאת בדיקה

  async function _callStorageApi(action, key, value){
    const res = await fetch(STORAGE_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, key, value })
    });
    if(!res.ok) throw new Error('storage api error ' + res.status);
    return res.json();
  }

  function _localFallback(){
    return {
      async get(key){
        const value = localStorage.getItem(key);
        return value === null ? null : { value };
      },
      async set(key, value){
        localStorage.setItem(key, value);
        return { ok: true };
      },
      async delete(key){
        localStorage.removeItem(key);
        return { ok: true };
      }
    };
  }

  const _local = _localFallback();

  if(!window.storage){
    window.storage = {
      async get(key){
        try {
          const data = await _callStorageApi('get', key);
          _sharedStorageAvailable = true;
          if(data && data.value != null) return { value: data.value };
          // אין עדיין ערך בשרת — אם יש ערך מקומי ישן (משימוש קודם בדפדפן הזה), נעלה אותו לשרת פעם אחת.
          const localVal = await _local.get(key);
          if(localVal && localVal.value != null){
            try { await _callStorageApi('set', key, localVal.value); } catch(e){}
            return localVal;
          }
          return null;
        } catch(e){
          _sharedStorageAvailable = false;
          return _local.get(key);
        }
      },
      async set(key, value){
        try {
          await _callStorageApi('set', key, value);
          _sharedStorageAvailable = true;
          return { ok: true };
        } catch(e){
          _sharedStorageAvailable = false;
          return _local.set(key, value);
        }
      },
      async delete(key){
        try {
          await _callStorageApi('delete', key);
          _sharedStorageAvailable = true;
          return { ok: true };
        } catch(e){
          _sharedStorageAvailable = false;
          return _local.delete(key);
        }
      }
    };
  }

  /* ---------------- helpers ---------------- */
  const pad2 = n => n < 10 ? '0'+n : ''+n;
  const toISO = d => d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  const parseISO = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
  const todayISO = () => toISO(new Date());
  const fmt = n => Math.round(n).toLocaleString('en-US');
  const genId = () => 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  const monthsShort = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  const monthsFull = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  function ddmm(d){ return pad2(d.getDate())+'/'+pad2(d.getMonth()+1); }

  function dateObjToISO(d){
    // שימוש ב-UTC כדי למנוע הזזת יום בגלל Timezone בדפדפן
    return d.getUTCFullYear()+'-'+pad2(d.getUTCMonth()+1)+'-'+pad2(d.getUTCDate());
  }

  function excelSerialToISO(value){
    const serial = Number(value);
    if(!isFinite(serial)) return null;
    // Excel 1900 date system: 25569 = 1970-01-01
    const ms = Math.round((serial - 25569) * 86400 * 1000);
    const d = new Date(ms);
    return dateObjToISO(d);
  }



  const QUALITY_STORAGE_KEY = 'quality_entries_v1';
  const QUALITY_HEADER_MAP = {
    'date':'date','inspection date':'date','sample date':'date','created on':'date','posting date':'date','actual finish date':'date','process order delivered date':'date','date of lot creation':'date','inspection lot ud date':'date','תאריך':'date',
    'process order #':'work_order','process order':'work_order','order':'work_order','work order':'work_order','פקודת עבודה':'work_order',
    'process order type #':'order_type','process order type':'order_type','order type':'order_type',
    'batch number':'batch','batch':'batch','אצווה':'batch',
    'material description':'material_name','material':'material_name','central item description':'material_name','material #':'material_code','central item #':'central_item','שם חומר':'material_name',
    'result status':'result_status','status':'result_status','qa status':'qa_approval',
    'qa approval':'qa_approval','approval':'qa_approval','qa status':'qa_approval',
    'ud code':'ud_code','usage decision':'ud_code',
    'rejected characteristics':'rejected_characteristics','approved characteristics':'approved_characteristics','process order delivered':'delivered_quantity',
    'inspection lot':'inspection_lot','inspection lot #':'inspection_lot',
    'storage location':'facility','facility':'facility','site':'facility','מתקן':'facility',
    'line':'line','resource':'line','work center':'line','production line':'line','operation short text':'test_name','קו':'line',
    'characteristic':'test_name','test':'test_name','inspection characteristic':'test_name','operation short text':'test_name','ud remarks':'remarks','batch remarks':'remarks'
  };

  function normKeyPart(v){ return String(v || '').trim().toUpperCase(); }
  function qualityKey(row){ return [normKeyPart(row.date), normKeyPart(row.workOrder), normKeyPart(row.batch)].join('|'); }
  function qualityKeyFallback(row){ return [normKeyPart(row.date), normKeyPart(row.workOrder)].join('|'); }

  function normalizeFacilityForQuality(f){
    const s = String(f || '').trim();
    return OLD_TO_NEW_FACILITY[s] || s;
  }

  function qualityBatchDateKey(row){
    return [normKeyPart(row.date), normKeyPart(row.batch)].join('|');
  }

  function qualityMatchesPackaging(q, e){
    if(!q || !e) return false;
    const sameDate = normKeyPart(q.date) === normKeyPart(e.date);
    const sameBatch = normKeyPart(q.batch) && normKeyPart(q.batch) === normKeyPart(e.batch);
    const qFac = normalizeFacilityForQuality(q.facility);
    const eFac = normalizeFacilityForQuality(e.facility);
    const sameFacility = !qFac || !eFac || qFac === eFac;
    const sameWorkOrder = normKeyPart(q.workOrder) && normKeyPart(q.workOrder) === normKeyPart(e.workOrder);

    if(sameDate && sameWorkOrder && sameBatch) return true;
    if(sameDate && sameBatch && sameFacility) return true;
    return false;
  }


  function classifyQuality(row){
    const status = String(row.resultStatus || '').toUpperCase();
    const approvalRaw = String(row.qaApproval || '');
    const approval = approvalRaw.toUpperCase();
    const ud = String(row.udCode || '').toUpperCase();
    const rejectedCount = Number(row.rejectedCharacteristics || 0);

    if(
      status.includes('REJECT') ||
      approval.includes('CONTAMIN') ||
      ud.includes('CONTAMIN') ||
      approvalRaw.includes('פסולה') ||
      approvalRaw.includes('פסול')
    ) return 'bad';

    if(
      approval.includes('RESTRICT') ||
      approval.includes('CONDITION') ||
      ud.includes('RESTRICT') ||
      ud.includes('COND') ||
      approvalRaw.includes('חריג') ||
      approvalRaw.includes('מוגבל') ||
      rejectedCount > 0
    ) return 'conditional';

    return 'ok';
  }

  function qualityLabel(cls){
    if(cls === 'bad') return '🔴 חריגה';
    if(cls === 'conditional') return '🟠 מותנה / מוגבל';
    return '🟢 תקין';
  }

  function buildQualitySummary(){
    const byKey = {};
    qualityEntries.forEach(q=>{
      const key = qualityKey(q);
      if(!byKey[key]){
        byKey[key] = {
          key:key, date:q.date, workOrder:q.workOrder, batch:q.batch, materialName:q.materialName,
          facility:q.facility, line:q.line, inspectionLot:q.inspectionLot, orderType:q.orderType, deliveredQuantity:0,
          totalTests:0, rejections:0, conditional:0, restricted:0, contaminated:0, worst:'ok', examples:[]
        };
      }
      const g = byKey[key];
      g.totalTests++;
      g.deliveredQuantity += Number(q.deliveredQuantity)||0;
      const status = String(q.resultStatus || '').toUpperCase();
      const approval = String(q.qaApproval || '').toUpperCase();
      const ud = String(q.udCode || '').toUpperCase();
      const cls = classifyQuality(q);
      if(status.includes('REJECT') || Number(q.rejectedCharacteristics||0)>0) g.rejections += Number(q.rejectedCharacteristics||1);
      if(approval.includes('CONDITION') || ud.includes('COND')) g.conditional++;
      if(approval.includes('RESTRICT') || ud.includes('RESTRICT')) g.restricted++;
      if(approval.includes('CONTAMIN') || ud.includes('CONTAMIN')) g.contaminated++;
      if(cls === 'bad') g.worst = 'bad';
      else if(cls === 'conditional' && g.worst !== 'bad') g.worst = 'conditional';
      if(cls !== 'ok' && g.examples.length < 3){
        g.examples.push([q.testName, q.resultStatus, q.qaApproval, q.udCode, q.remarks].filter(Boolean).join(' | '));
      }
    });
    qualitySummary = byKey;
  }

  function getQualityForPackaging(e){
    const exact = qualitySummary[qualityKey(e)];
    if(exact) return exact;

    const matches = Object.values(qualitySummary).filter(q => qualityMatchesPackaging(q, e));
    if(matches.length === 1) return matches[0];
    if(matches.length > 1){
      const worst = matches.some(q=>q.worst==='bad') ? 'bad' : (matches.some(q=>q.worst==='conditional') ? 'conditional' : 'ok');
      return {
        date: e.date,
        workOrder: e.workOrder,
        batch: e.batch,
        materialName: e.materialName,
        facility: e.facility,
        totalTests: matches.reduce((s,q)=>s+(q.totalTests||0),0),
        rejections: matches.reduce((s,q)=>s+(q.rejections||0),0),
        restricted: matches.reduce((s,q)=>s+(q.restricted||0),0),
        contaminated: matches.reduce((s,q)=>s+(q.contaminated||0),0),
        worst,
        examples: matches.flatMap(q=>q.examples||[]).slice(0,3)
      };
    }
    return null;
  }

  async function persistQuality(){
    try {
      const res = await window.storage.set(QUALITY_STORAGE_KEY, JSON.stringify(qualityEntries), true);
      if(!res) throw new Error('no result');
      return true;
    } catch(e){
      showToast('שגיאה בשמירת נתוני האיכות', true);
      return false;
    }
  }

  async function loadQuality(){
    try {
      const res = await window.storage.get(QUALITY_STORAGE_KEY, true);
      qualityEntries = res && res.value ? JSON.parse(res.value) : [];
    } catch(e){
      qualityEntries = [];
    }
    buildQualitySummary();
  }

  function mapQualityHeaders(headerRow){
    const map = {};
    headerRow.forEach((h,i)=>{
      const raw = String(h || '').trim();
      const k = QUALITY_HEADER_MAP[raw] || QUALITY_HEADER_MAP[raw.toLowerCase()];
      if(k && map[k] === undefined) map[k] = i;
    });
    return map;
  }

  function processQualityRows(headerRow, dataRows){
    const map = mapQualityHeaders(headerRow);
    const getStr = (cols, idx, def) => {
      if(idx===undefined) return def||'';
      const v = cols[idx];
      if(v===undefined||v===null) return def||'';
      const s=(''+v).trim();
      return s || (def||'');
    };
    const rows = [];
    dataRows.forEach(cols=>{
      if(!cols || cols.length===0) return;
      let rawDate = map.date!==undefined ? cols[map.date] : '';
      let date = '';
      if(rawDate instanceof Date) date = dateObjToISO(rawDate);
      else if(typeof rawDate === 'number') date = excelSerialToISO(rawDate);
      else if(rawDate !== undefined && rawDate !== null && rawDate !== '') date = normalizeDateStr(String(rawDate)) || String(rawDate).trim();
      const q = {
        id: genId(), date:date, workOrder:getStr(cols,map.work_order,''), batch:getStr(cols,map.batch,''),
        materialName:getStr(cols,map.material_name,''), resultStatus:getStr(cols,map.result_status,''),
        qaApproval:getStr(cols,map.qa_approval,''), udCode:getStr(cols,map.ud_code,''),
        orderType:getStr(cols,map.order_type,''), rejectedCharacteristics:Number(getStr(cols,map.rejected_characteristics,'0'))||0,
        approvedCharacteristics:Number(getStr(cols,map.approved_characteristics,'0'))||0,
        deliveredQuantity:Number(getStr(cols,map.delivered_quantity,'0'))||0,
        inspectionLot:getStr(cols,map.inspection_lot,''), facility:normalizeFacilityForQuality(getStr(cols,map.facility,'')),
        line:getStr(cols,map.line,''), testName:getStr(cols,map.test_name,''), remarks:getStr(cols,map.remarks,''), createdAt:Date.now()
      };
      if(q.workOrder || q.batch || q.inspectionLot) rows.push(q);
    });
    return rows;
  }

  async function handleQualityFile(file){
    try{
      const name = file.name.toLowerCase();
      let headerRow, dataRows;
      if(name.endsWith('.xlsx') || name.endsWith('.xls')){
        if(typeof XLSX === 'undefined'){ showToast('ספריית קריאת האקסל לא נטענה. נסו לרענן את העמוד.', true); return; }
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:'array', cellDates:false});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const grid = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
        if(grid.length<2){ showToast('קובץ האיכות לא מכיל שורות נתונים', true); return; }
        headerRow = grid[0]; dataRows = grid.slice(1);
      } else {
        const text = await file.text();
        const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
        if(lines.length<2){ showToast('קובץ האיכות לא מכיל שורות נתונים', true); return; }
        const cleanFirst = lines[0].replace(/^\uFEFF/,'');
        const delim = detectDelimiter(cleanFirst);
        headerRow = splitCSVLine(cleanFirst, delim);
        dataRows = lines.slice(1).map(l=>splitCSVLine(l, delim));
      }
      const rows = processQualityRows(headerRow, dataRows);
      if(rows.length===0){ showToast('לא נמצאו רשומות איכות תקינות', true); return; }
      qualityEntries = rows;
      buildQualitySummary();
      const ok = await persistQuality();
      if(ok){ showToast('יובאו '+rows.length+' שורות איכות בהצלחה'); renderAll(); }
    } catch(e){
      console.error(e);
      showToast('שגיאה בקריאת קובץ האיכות', true);
    }
  }

  function eventTypeLabel(type){ return type === 'environment' ? 'אירוע סביבה' : 'אירוע איכות'; }
  function eventTypeClass(type){ return type === 'environment' ? 'event-type-env' : 'event-type-quality'; }
  function filteredEventsForView(view){
    const rows = eventsEntries || [];
    const dates = new Set((view.filtered||[]).map(e=>e.date));
    const facs = selectedFacilities === null ? null : new Set(Array.from(selectedFacilities));
    return rows.filter(ev=>{
      if(dates.size && !dates.has(ev.date)) return false;
      if(facs && ev.facility && !facs.has(ev.facility)) return false;
      return true;
    }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  }
  function renderEventsPanel(view){
    const container = root.querySelector('#eventsPanel');
    if(!container) return;
    const rows = filteredEventsForView(view);
    const qRows = rows.filter(e=>e.type==='quality');
    const envRows = rows.filter(e=>e.type==='environment');
    const detailRows = eventsDetailMode === 'quality' ? qRows : (eventsDetailMode === 'environment' ? envRows : (eventsDetailMode === 'all' ? rows : []));
    let html = '<div class="panel"><div class="panel-head"><div><div class="panel-title">אירועי איכות וסביבה</div><div class="kpi-sub">נשמרים ידנית ומוצגים לפי טווח התאריכים והמתקן שנבחרו</div></div><button class="panel-toggle-btn" id="openEventModalBtn">+ הוסף אירוע</button></div>'+ 
      '<div class="insight-stats">'+
      '<div class="kpi-card num clickable-kpi event-card '+(eventsDetailMode==='all'?'active':'')+'" data-event-mode="all"><div class="kpi-label">סה״כ אירועים בטווח</div><span class="kpi-num">'+fmt(rows.length)+'</span><div class="kpi-sub">לחץ להצגת הרשומות</div></div>'+
      '<div class="kpi-card num clickable-kpi event-card '+(eventsDetailMode==='quality'?'active':'')+'" data-event-mode="quality"><div class="kpi-label">אירועי איכות</div><span class="kpi-num">'+fmt(qRows.length)+'</span><div class="kpi-sub">לחץ להצגת אירועי איכות</div></div>'+
      '<div class="kpi-card num clickable-kpi event-card '+(eventsDetailMode==='environment'?'active':'')+'" data-event-mode="environment"><div class="kpi-label">אירועי סביבה</div><span class="kpi-num">'+fmt(envRows.length)+'</span><div class="kpi-sub">לחץ להצגת אירועי סביבה</div></div>'+
      '</div>';
    if(!eventsDetailMode){
      html += '<div class="table-empty" style="padding:16px 10px;">לחץ על אחד הכרטיסים להצגת פירוט אירועים</div>';
    } else if(detailRows.length === 0){
      html += '<div class="table-empty">לא נמצאו אירועים מתאימים בטווח הנבחר</div>';
    } else {
      const title = eventsDetailMode === 'quality' ? 'אירועי איכות' : (eventsDetailMode === 'environment' ? 'אירועי סביבה' : 'כל האירועים');
      html += '<div class="panel-head" style="margin-top:8px;"><div class="panel-title">'+title+' — פירוט</div><button class="panel-toggle-btn" id="closeEventsDetails">סגור פירוט</button></div>'+
        '<div class="table-scroll"><table><thead><tr><th>תאריך</th><th>סוג</th><th>מתקן</th><th>קו/אזור</th><th>פקודה</th><th>Batch</th><th>חומרה</th><th>תיאור</th><th>פעולה מתקנת</th></tr></thead><tbody>';
      detailRows.forEach(ev=>{
        html += '<tr><td class="mono">'+escapeHtml(ev.date||'')+'</td><td class="'+eventTypeClass(ev.type)+'">'+eventTypeLabel(ev.type)+'</td><td class="mono">'+escapeHtml(ev.facility||'—')+'</td><td>'+escapeHtml(ev.area||'—')+'</td><td class="mono">'+escapeHtml(ev.workOrder||'—')+'</td><td class="mono">'+escapeHtml(ev.batch||'—')+'</td><td>'+escapeHtml(ev.severity||'—')+'</td><td>'+escapeHtml(ev.description||'—')+'</td><td>'+escapeHtml(ev.action||'—')+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';
    container.innerHTML = html;
    const addBtn = container.querySelector('#openEventModalBtn');
    if(addBtn) addBtn.onclick = openEventModal;
    container.querySelectorAll('[data-event-mode]').forEach(card=>{
      card.onclick = ()=>{ const mode = card.dataset.eventMode; eventsDetailMode = eventsDetailMode === mode ? null : mode; renderAll(); };
    });
    const closeBtn = container.querySelector('#closeEventsDetails');
    if(closeBtn) closeBtn.onclick = ()=>{ eventsDetailMode = null; renderAll(); };
  }

  function openEventModal(){
    root.querySelector('#ev_date').value = effectiveDay ? effectiveDay() : todayISO();
    root.querySelector('#ev_type').value = 'quality';
    root.querySelector('#ev_facility').value = selectedFacilities && selectedFacilities.size === 1 ? Array.from(selectedFacilities)[0] : '';
    root.querySelector('#ev_area').value = '';
    root.querySelector('#ev_workorder').value = '';
    root.querySelector('#ev_batch').value = '';
    root.querySelector('#ev_severity').value = 'בינוני';
    root.querySelector('#ev_desc').value = '';
    root.querySelector('#ev_action').value = '';
    root.querySelector('#eventOverlay').classList.add('open');
  }

  async function saveEventFromModal(){
    const date = root.querySelector('#ev_date').value;
    const type = root.querySelector('#ev_type').value;
    const desc = root.querySelector('#ev_desc').value.trim();
    if(!date || !desc){ showToast('חובה להזין תאריך ותיאור אירוע', true); return; }
    eventsEntries.push({
      id: genId(), date, type,
      facility: root.querySelector('#ev_facility').value,
      area: root.querySelector('#ev_area').value.trim(),
      workOrder: root.querySelector('#ev_workorder').value.trim(),
      batch: root.querySelector('#ev_batch').value.trim(),
      severity: root.querySelector('#ev_severity').value,
      description: desc,
      action: root.querySelector('#ev_action').value.trim(),
      createdAt: Date.now()
    });
    const ok = await persistEventsEntries();
    if(ok){ root.querySelector('#eventOverlay').classList.remove('open'); showToast('האירוע נשמר'); renderAll(); }
  }

  function renderQualityDashboard(view){
    const container = root.querySelector('#qualityPanel');
    if(!container) return;
    const summaryRows = Object.values(qualitySummary || {});
    if(summaryRows.length === 0){
      container.innerHTML = '<div class="panel"><div class="panel-head"><div class="panel-title">איכות — סיכום מנות</div></div><div class="table-empty">לא נטען קובץ איכות</div></div>';
      return;
    }
    const matched = summaryRows.filter(q => view.filtered.some(e => qualityMatchesPackaging(q, e)));
    const badRows = matched.filter(q=>q.worst==='bad');
    const conditionalRows = matched.filter(q=>q.worst==='conditional' || q.restricted>0);
    const badLots = badRows.length;
    const conditionalLots = matched.filter(q=>q.worst==='conditional').length;
    const restrictedLots = matched.filter(q=>q.restricted>0).length;
    const detailRows = qualityDetailMode === 'all' ? matched : (qualityDetailMode === 'bad' ? badRows : (qualityDetailMode === 'conditional' ? conditionalRows : []));
    const titleMap = { all:'מנות איכות בטווח', bad:'מנות חורגות', conditional:'מותנה / מוגבל' };
    let html = '<div class="panel"><div class="panel-head"><div class="panel-title">איכות — סיכום מנות</div><div class="legend"><span>נטענו '+qualityEntries.length+' שורות איכות</span></div></div>'+ 
      '<div class="insight-stats">'+

          '<td class="mono">'+escapeHtml(q.orderType||'—')+'</td><td class="mono">'+fmt(q.deliveredQuantity||0)+'</td><td class="mono">'+fmt(q.totalTests)+'</td><td class="mono">'+fmt(q.rejections)+'</td>'+

  function showConfirm(message){
    return new Promise(resolve=>{
      root.querySelector('#confirmMessage').textContent = message;
      const overlay = root.querySelector('#confirmOverlay');
      overlay.classList.add('open');
      const yes = root.querySelector('#confirmYes');
      const no = root.querySelector('#confirmNo');

      overlay.onclick = (e)=>{ if(e.target===overlay) cleanup(false); };

  function showToast(msg, isErr){

  /* ---------------- state ---------------- */
  let entries = [];
  let qualityEntries = [];
  let qualitySummary = {};
  let loaded = false;
  let tab = 'day';
  const filters = {
    day: null,            // null = auto (latest date with data)
    periodStart: null, periodEnd: null,
    month: null,          // 'YYYY-MM'
    qYear: null, qQuarter: null,
    year: null
  };

  const FACILITY_OPTIONS = ['1540','1541','1542','1543','1519','1525','1528','1524','1523','1521'];
  const OLD_TO_NEW_FACILITY = { '42':'1542', '43':'1543', '28':'1528', '24':'1524', '23':'1523', '41':'1541', '25':'1525' };
  const PLANTS = ['XX15'];
  const FACILITY_TO_PLANT = { '1540':'XX15', '1541':'XX15', '1542':'XX15', '1543':'XX15', '1519':'XX15', '1525':'XX15', '1528':'XX15', '1524':'XX15', '1523':'XX15', '1521':'XX15' };
  function getPlant(facility){ return FACILITY_TO_PLANT[facility] || PLANTS[0] || ''; }
  const SHIFTS = ['בוקר','ערב','לילה'];
  const PACKAGING_TYPES = ['קו אריזה 1 ליטר','קו אריזה 5 ליטר','קו אריזה 10/20 ליטר'];
  const DAILY_TARGET_DEFAULTS = { 'קו אריזה 1 ליטר': 18000, 'קו אריזה 5 ליטר': 60000, 'קו אריזה 10/20 ליטר': 60000 };
  const OLD_TO_NEW_PACKAGING_TYPE = { 'קו אריזה 10 ליטר': 'קו אריזה 10/20 ליטר', 'קו אריזה 20 ליטר': 'קו אריזה 10/20 ליטר' };
  const GENERAL_KEY = '__general__';
  const PACKAGING_ONLY_FACILITIES = ['1542','1543','1519'];
  const PRODUCTION_FACILITIES = FACILITY_OPTIONS.filter(f=>!PACKAGING_ONLY_FACILITIES.includes(f));
  // ערכי ברירת מחדל ראשוניים בלבד — לאחר השמירה הראשונה דרך כפתור "יעדי ייצור" / "יעדי אריזה",
  // הערכים שהוזנו על ידי המשתמש הם אלו שקובעים את היעד (גם במחוונים), עד לשינוי הבא.
  const PRODUCTION_TARGET_DAILY_DEFAULTS = { '1528': 80000, '1523': 40000, '1524': 6000, '1540': 18000, '1541': 7000, '1525': 4333 };
  const FACILITY_PACKAGING_DAILY_DEFAULTS = {
    '1542': { 'קו אריזה 1 ליטר': 18000, 'קו אריזה 5 ליטר': 60000, 'קו אריזה 10/20 ליטר': 60000 }
  };
  const FACILITY_PACKAGING_FLAT_DAILY_DEFAULTS = { '1543': 80000 };

  function buildShiftMatrix(dailyTotal){
    const m = {};
    SHIFTS.forEach(s=>{ m[s] = dailyTotal / SHIFTS.length; });
    return m;
  }
  function defaultPackagingTargets(){
    const t = {};
    t[GENERAL_KEY] = {};
    PACKAGING_TYPES.forEach(p=>{ t[GENERAL_KEY][p] = buildShiftMatrix(DAILY_TARGET_DEFAULTS[p]); });
    Object.keys(FACILITY_PACKAGING_DAILY_DEFAULTS).forEach(fac=>{
      t[fac] = {};
      PACKAGING_TYPES.forEach(p=>{ t[fac][p] = buildShiftMatrix(FACILITY_PACKAGING_DAILY_DEFAULTS[fac][p]); });
    });
    Object.keys(FACILITY_PACKAGING_FLAT_DAILY_DEFAULTS).forEach(fac=>{
      const cell = FACILITY_PACKAGING_FLAT_DAILY_DEFAULTS[fac] / (PACKAGING_TYPES.length * SHIFTS.length);
      t[fac] = {};
      PACKAGING_TYPES.forEach(p=>{ t[fac][p] = buildShiftMatrix(cell * SHIFTS.length); });
    });
    return t;
  }
  function defaultProductionTargets(){
    const t = {};
    Object.keys(PRODUCTION_TARGET_DAILY_DEFAULTS).forEach(fac=>{ t[fac] = buildShiftMatrix(PRODUCTION_TARGET_DAILY_DEFAULTS[fac]); });
    return t;
  }
  let packagingTargets = defaultPackagingTargets();
  let productionTargets = defaultProductionTargets();

  // יעד יומי כולל למתקן ייצור — סכום היעדים שהוזנו לכל המשמרות (דרך כפתור "יעדי ייצור").
  // זהו המקור היחיד לחישוב מחוון היעד של מתקן ייצור: שינוי בכפתור משתקף אוטומטית במחוון.
  function dailyProductionTargetForFacility(facility){
    const m = productionTargets[facility];
    if(!m) return 0;
    let sum = 0;
    SHIFTS.forEach(s=>{ sum += Number(m[s] || 0); });
    return sum;
  }
  // יעד יומי כולל למתקן אריזה — סכום היעדים שהוזנו לכל סוגי האריזה ולכל המשמרות
  // (דרך כפתור "יעדי אריזה", עם התאמה אישית למתקן אם קיימת, אחרת ברירת המחדל הכללית).
  function dailyPackagingTargetForFacility(facility){
    const matrix = (facility && packagingTargets[facility]) ? packagingTargets[facility] : packagingTargets[GENERAL_KEY];
    if(!matrix) return 0;
    let sum = 0;
    PACKAGING_TYPES.forEach(p=>{
      SHIFTS.forEach(s=>{ sum += Number((matrix[p] && matrix[p][s]) || 0); });
    });
    return sum;
  }
  // יעד יומי לסוג אריזה בודד, ספציפי למתקן (לכל המשמרות יחד) — לפי כפתור "יעדי אריזה" של המתקן.
  function facilityPackagingDailyTargetForType(facility, type){
    const matrix = (facility && packagingTargets[facility]) ? packagingTargets[facility] : packagingTargets[GENERAL_KEY];
    if(!matrix || !matrix[type]) return 0;
    let sum = 0;
    SHIFTS.forEach(s=>{ sum += Number(matrix[type][s] || 0); });
    return sum;
  }
  let periodPackagingTargets = {}; // יעדי אריזה ידניים לפי תצוגה/טווח/מתקן
  function getPackagingTarget(e){
    if(e.targetPackaging && e.targetPackaging>0) return e.targetPackaging;
    if(!e.packagingType || !e.shift) return 0;
    const facMatrix = (e.facility && packagingTargets[e.facility]) ? packagingTargets[e.facility] : packagingTargets[GENERAL_KEY];
    if(facMatrix && facMatrix[e.packagingType] && facMatrix[e.packagingType][e.shift]!=null) return facMatrix[e.packagingType][e.shift];
    const gen = packagingTargets[GENERAL_KEY];
    if(gen && gen[e.packagingType] && gen[e.packagingType][e.shift]!=null) return gen[e.packagingType][e.shift];
    return 0;
  }
  function getProductionTarget(e){
    if(e.targetProduction && e.targetProduction>0) return e.targetProduction;
    if(!e.facility || !e.shift) return 0;
    if(productionTargets[e.facility] && productionTargets[e.facility][e.shift]!=null) return productionTargets[e.facility][e.shift];
    return 0;
  }
  function deliveredAmount(e){
    return PACKAGING_ONLY_FACILITIES.includes(e.facility) ? e.packaging : e.production;
  }
  function orderShortfall(e){
    if(!e.orderQuantity || e.orderQuantity<=0) return 0;
    const d = deliveredAmount(e);
    const gap = e.orderQuantity - d;
    return gap>0 ? gap : 0;
  }
  function pendingPackagingQty(e){
    if(!e.confirmedYield || e.confirmedYield<=0) return 0;
    const d = deliveredAmount(e);
    const gap = e.confirmedYield - d;
    return gap>0 ? gap : 0;
  }
  function isOrderClosed(e){
    return /\bTECO\b/.test(e.systemStatus||'');
  }
  let selectedFacilities = null; // null = all facilities (no filter)
  let showAdvancedDashboard = false;
  let qualityDetailMode = null; // null / all / bad / conditional
  let tableExpanded = false;
  let dailyUtilizationExpanded = false;
  let orderShortfallExpanded = false;
  let trendDetail = null; // {index, metric}
  let eventsEntries = [];
  let eventsDetailMode = null; // null / all / quality / environment
  let manualPackagingTargetTypes = null; // null = אוטומטי לפי קווים שעבדו בפועל
  let manualPackagingDays = null; // null = מספר ימי הטווח שנבחר

  function allFacilities(){
    const set = new Set(FACILITY_OPTIONS);
    entries.forEach(e=>{ if(e.facility) set.add(e.facility); });
    return Array.from(set).sort((a,b)=> (isNaN(a)||isNaN(b)) ? (''+a).localeCompare(''+b) : (a-b));
  }
  function facilityFilteredEntries(){
    let filtered = entries;

    if(selectedFacilities !== null){
      filtered = filtered.filter(e=> selectedFacilities.has(e.facility || 'לא מוגדר'));
    }

    // כלל עסקי למתקן 1542:
    // כאשר מתקן 1542 נבחר, יש לקחת רק שורות שבהן Order Type מכיל ZFIN.
    if(selectedFacilities && selectedFacilities.has('1542')){
      filtered = filtered.filter(e=>{
        if(e.facility !== '1542') return true;
        return String(e.orderType || '').toUpperCase().includes('ZFIN');
      });
    }

    return filtered;
  }
  function toggleFacility(fac){
    if(fac === '__all__'){ selectedFacilities = null; return; }
    if(selectedFacilities === null){ selectedFacilities = new Set([fac]); return; }
    if(selectedFacilities.has(fac)) selectedFacilities.delete(fac);
    else selectedFacilities.add(fac);
    if(selectedFacilities.size === 0) selectedFacilities = null;
  }

  const STORAGE_KEY = 'production_entries'; // מפתח legacy ישן (שמכיל את כל הרשומות בבלוב אחד) — נשמר לתאימות לאחור בלבד
  const ENTRIES_KEY_PREFIX = 'entries_month:'; // כל חודש נשמר בנפרד כדי שכל שמירה תהיה קטנה ומהירה, גם כשיש עשרות אלפי רשומות
  const ENTRIES_INDEX_KEY = 'entries_months_index_v1'; // רשימת החודשים שבהם יש בפועל רשומות שמורות
  const STORAGE_KEY_TARGETS = 'packaging_targets';
  const STORAGE_KEY_PROD_TARGETS = 'production_targets';
  const STORAGE_KEY_PERIOD_TARGETS = 'period_packaging_targets_v1';
  const STORAGE_KEY_EVENTS = 'production_events_quality_environment_v1';

  function migrateFacilityKey(obj){
    let changed = false;
    Object.keys(OLD_TO_NEW_FACILITY).forEach(oldKey=>{
      const newKey = OLD_TO_NEW_FACILITY[oldKey];
      if(obj[oldKey] !== undefined){
        if(obj[newKey] === undefined) obj[newKey] = obj[oldKey];
        delete obj[oldKey];
        changed = true;
      }
    });
    return changed;
  }

  function migratePackagingTypeKeys(packagingTargetsObj){
    let changed = false;
    Object.keys(packagingTargetsObj).forEach(topKey=>{
      const typeObj = packagingTargetsObj[topKey];
      if(!typeObj || typeof typeObj !== 'object') return;
      Object.keys(OLD_TO_NEW_PACKAGING_TYPE).forEach(oldType=>{
        const newType = OLD_TO_NEW_PACKAGING_TYPE[oldType];
        if(typeObj[oldType] !== undefined){
          if(!typeObj[newType]) typeObj[newType] = {};
          SHIFTS.forEach(s=>{
            const oldVal = typeObj[oldType][s] || 0;
            const newVal = typeObj[newType][s] || 0;
            if(oldVal>0) typeObj[newType][s] = newVal + oldVal;
          });
          delete typeObj[oldType];
          changed = true;
        }
      });
    });
    return changed;
  }

  function entryMonthKey(dateISO){
    const ym = (dateISO && dateISO.length >= 7) ? dateISO.slice(0, 7) : 'unknown';
    return ENTRIES_KEY_PREFIX + ym;
  }

  async function loadEntries(){
    entries = [];
    let usedChunkedFormat = false;
    try {
      const idxRes = await window.storage.get(ENTRIES_INDEX_KEY, true);
      const months = idxRes && idxRes.value ? JSON.parse(idxRes.value) : null;
      if(months && Array.isArray(months) && months.length > 0){
        usedChunkedFormat = true;
        const results = await Promise.all(months.map(m =>
          window.storage.get(ENTRIES_KEY_PREFIX + m, true).catch(()=>null)
        ));
        results.forEach(r=>{
          if(r && r.value){
            try { entries = entries.concat(JSON.parse(r.value)); } catch(e){}
          }
        });
      }
    } catch(e){ /* ignore, will fall back to legacy below */ }

    if(!usedChunkedFormat){
      // אין עדיין אינדקס חודשים — ייתכן שזה שימוש ראשון, או נתונים ישנים בפורמט הקודם (בלוב אחד גדול).
      try {
        const legacy = await window.storage.get(STORAGE_KEY, true);
        if(legacy && legacy.value){
          entries = JSON.parse(legacy.value);
        }
      } catch(e){ entries = []; }
    }

    let migrated = false;
    entries.forEach(e=>{
      if(e.facility && OLD_TO_NEW_FACILITY[e.facility]){
        e.facility = OLD_TO_NEW_FACILITY[e.facility];
        e.plant = getPlant(e.facility);
        migrated = true;
      }
      if(e.packagingType && OLD_TO_NEW_PACKAGING_TYPE[e.packagingType]){
        e.packagingType = OLD_TO_NEW_PACKAGING_TYPE[e.packagingType];
        migrated = true;
      }
      if(e.orderType === undefined){
        e.orderType = '';
        migrated = true;
      }
    });
    loaded = true;
    // אם זו הייתה טעינה מהפורמט הישן (בלוב אחד), או שהיה צריך מיגרציה — נשמור מיד בפורמט המחולק החדש.
    if(migrated || !usedChunkedFormat) await persist();
  }

  async function loadTargets(){
    let loadedTargets = null;
    try {
      const res = await window.storage.get(STORAGE_KEY_TARGETS, true);
      loadedTargets = res && res.value ? JSON.parse(res.value) : null;
    } catch(e){
      loadedTargets = null;
    }
    if(loadedTargets){
      const isOldFlatFormat = PACKAGING_TYPES.some(p => loadedTargets[p] !== undefined);
      if(isOldFlatFormat){
        const migrated = defaultPackagingTargets();
        migrated[GENERAL_KEY] = loadedTargets;
        packagingTargets = migrated;
        await persistTargets();
      } else {
        const facilityKeysMigrated = migrateFacilityKey(loadedTargets);
        const typeKeysMigrated = migratePackagingTypeKeys(loadedTargets);
        packagingTargets = loadedTargets;
        if(facilityKeysMigrated || typeKeysMigrated) await persistTargets();
      }
    } else {
      packagingTargets = defaultPackagingTargets();
      await persistTargets();
    }
  }

  async function persistTargets(){
    try {
      const res = await window.storage.set(STORAGE_KEY_TARGETS, JSON.stringify(packagingTargets), true);
      if(!res) throw new Error('no result');
      return true;
    } catch(e){
      showToast('שגיאה בשמירת היעדים. נסו שוב.', true);
      return false;
    }
  }

  async function loadProductionTargets(){
    let loadedTargets = null;
    try {
      const res = await window.storage.get(STORAGE_KEY_PROD_TARGETS, true);
      loadedTargets = res && res.value ? JSON.parse(res.value) : null;
    } catch(e){
      loadedTargets = null;
    }
    if(loadedTargets){
      const facilityKeysMigrated = migrateFacilityKey(loadedTargets);
      productionTargets = loadedTargets;
      if(facilityKeysMigrated) await persistProductionTargets();
    } else {
      productionTargets = defaultProductionTargets();
      await persistProductionTargets();
    }
  }

  async function persistProductionTargets(){
    try {
      const res = await window.storage.set(STORAGE_KEY_PROD_TARGETS, JSON.stringify(productionTargets), true);
      if(!res) throw new Error('no result');
      return true;
    } catch(e){
      showToast('שגיאה בשמירת יעדי הייצור. נסו שוב.', true);
      return false;
    }
  }


  function selectedFacilitiesKey(){
    return selectedFacilities === null ? 'all' : Array.from(selectedFacilities).sort().join('|');
  }


  function currentRangeDayCount(){
    if(tab === 'period'){
      const r = effectivePeriod();
      return Math.max(1, Math.round((parseISO(r.end) - parseISO(r.start)) / 86400000) + 1);
    }
    if(tab === 'month'){
      const ym = effectiveMonth();
      const parts = ym.split('-').map(Number);
      return new Date(parts[0], parts[1], 0).getDate();
    }
    if(tab === 'quarter'){
      const y = effectiveQYear(), q = effectiveQQuarter();
      const s = new Date(y, (q-1)*3, 1), e = new Date(y, (q-1)*3 + 3, 0);
      return Math.max(1, Math.round((e-s)/86400000)+1);
    }
    if(tab === 'year'){
      const y = effectiveYear();
      const s = new Date(y,0,1), e = new Date(y,11,31);
      return Math.max(1, Math.round((e-s)/86400000)+1);
    }
    return 1;
  }

  function packagingDailyTargetForType(type){
    return Number(DAILY_TARGET_DEFAULTS[type] || 0);
  }

  function workedPackagingDatesFromRows(rows){
    const set = new Set();
    (rows || []).forEach(e=>{
      if(e && e.date && Number(e.packaging || 0) > 0) set.add(e.date);
    });
    return Array.from(set).sort();
  }

  function workedPackagingTypesFromRows(rows){
    const set = new Set();
    (rows || []).forEach(e=>{
      if(e && e.packagingType && Number(e.packaging || 0) > 0) set.add(e.packagingType);
    });
    return Array.from(set).filter(t=>PACKAGING_TYPES.includes(t));
  }

  function targetPackagingTypesForView(view){
    if(manualPackagingTargetTypes instanceof Set && manualPackagingTargetTypes.size > 0){
      return Array.from(manualPackagingTargetTypes).filter(t=>PACKAGING_TYPES.includes(t));
    }
    return workedPackagingTypesFromRows((view && view.filtered) || []);
  }

  function packagingLineTargetBreakdownForRows(rowsIn){
    const rows = (rowsIn || []).filter(e=>Number(e.packaging || 0) > 0);
    const manualTypes = manualPackagingTargetTypes instanceof Set && manualPackagingTargetTypes.size > 0
      ? Array.from(manualPackagingTargetTypes).filter(t=>PACKAGING_TYPES.includes(t))
      : null;
    const daySet = new Set(rows.map(e=>e.date).filter(Boolean));
    const byType = {};
    const byDate = {};
    PACKAGING_TYPES.forEach(t=>{ byType[t] = {type:t, days:new Set(), actual:0, target:0}; });

    rows.forEach(e=>{
      const type = e.packagingType;
      const date = e.date || '';
      const qty = Number(e.packaging)||0;
      if(!date) return;
      if(!byDate[date]) byDate[date] = {date, actual:0, target:0, types:new Set()};
      byDate[date].actual += qty;
      if(type && byType[type]){
        byType[type].actual += qty;
        if(!manualTypes){
          byType[type].days.add(date);
          byDate[date].types.add(type);
        }
      }
    });

    if(manualTypes){
      daySet.forEach(date=>{
        if(!byDate[date]) byDate[date] = {date, actual:0, target:0, types:new Set()};
        manualTypes.forEach(type=>{
          if(byType[type]) byType[type].days.add(date);
          byDate[date].types.add(type);
        });
      });
    }

    Object.values(byType).forEach(g=>{
      g.daysCount = g.days.size;
      g.target = packagingDailyTargetForType(g.type) * g.daysCount;
      g.utilization = g.target>0 ? g.actual/g.target*100 : (g.actual>0 ? 100 : 0);
    });
    Object.values(byDate).forEach(g=>{
      g.target = Array.from(g.types).reduce((sum,t)=>sum+packagingDailyTargetForType(t),0);
      g.utilization = g.target>0 ? g.actual/g.target*100 : (g.actual>0 ? 100 : 0);
      g.types = Array.from(g.types).filter(t=>PACKAGING_TYPES.includes(t));
    });
    const typeRows = Object.values(byType).filter(g=>g.actual>0 || g.target>0);
    const dailyRows = Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
    return {
      workingDays: daySet.size,
      types: typeRows.map(g=>g.type),
      typeRows,
      dailyRows,
      target: typeRows.reduce((s,g)=>s+g.target,0),
      actual: rows.reduce((s,e)=>s+(Number(e.packaging)||0),0),
      mode: manualTypes ? 'manual' : 'auto'
    };
  }

  function packagingLineTargetBreakdown(view){
    return packagingLineTargetBreakdownForRows((view && view.filtered) || []);
  }

  function getLineBasedPackagingTarget(view){
    return packagingLineTargetBreakdown(view).target;
  }

  function getLineTargetInfo(view){
    return packagingLineTargetBreakdown(view);
  }

  function packagingFacilityLineBreakdown(facility, rows){
    const facRows = (rows || []).filter(e=>Number(e.packaging || 0) > 0);
    const manualTypes = manualPackagingTargetTypes instanceof Set && manualPackagingTargetTypes.size > 0
      ? Array.from(manualPackagingTargetTypes).filter(t=>PACKAGING_TYPES.includes(t))
      : null;
    const byDate = {};
    facRows.forEach(e=>{
      const date = e.date || '';
      if(!date) return;
      if(!byDate[date]) byDate[date] = {actual:0, types:new Set()};
      byDate[date].actual += Number(e.packaging) || 0;
      if(e.packagingType && PACKAGING_TYPES.includes(e.packagingType) && !manualTypes){
        byDate[date].types.add(e.packagingType);
      }
    });
    if(manualTypes){
      Object.keys(byDate).forEach(date=>{ manualTypes.forEach(t=>byDate[date].types.add(t)); });
    }
    let target = 0, actual = 0;
    Object.values(byDate).forEach(g=>{
      actual += g.actual;
      target += Array.from(g.types).reduce((s,t)=> s + facilityPackagingDailyTargetForType(facility, t), 0);
    });
    return {actual, target, days: Object.keys(byDate).length, mode: manualTypes ? 'manual' : 'auto'};
  }

  function packagingFacilityTargetRowsForView(view){
    const allRows = (view && view.filtered) || [];
    const fallbackDates = currentReportDatesFallback();
    const facs = selectedFacilities === null
      ? PACKAGING_ONLY_FACILITIES
      : PACKAGING_ONLY_FACILITIES.filter(f=>selectedFacilities.has(f));
    return facs.map(f=>{
      const facRows = allRows.filter(e=>String(e.facility || '')===String(f));
      const bd = packagingFacilityLineBreakdown(f, facRows);
      let actual = bd.actual, target = bd.target, days = bd.days, ruleLabel;
      if(actual <= 0 && target <= 0){
        // אין עדיין דיווח אריזה למתקן זה בטווח — מציגים יעד יומי מלא (כל סוגי האריזה) כברירת מחדל.
        days = fallbackDates.length || 0;
        const daily = dailyPackagingTargetForFacility(f);
        target = daily * days;
        ruleLabel = daily > 0 ? ('יעד יומי מלא '+fmt(daily)+' ליטר (לפי "יעדי אריזה") — אין עדיין דיווח') : 'אין יעד מוגדר — הגדירו בכפתור "יעדי אריזה"';
      } else {
        const modeText = bd.mode === 'manual' ? 'בחירה ידנית' : 'אוטומטי לפי קווי אריזה שדווחו בפועל';
        ruleLabel = target > 0 ? ('יעד '+modeText+' • יעד מחושב: '+fmt(target)+' ליטר (לפי "יעדי אריזה")') : 'אין יעד מוגדר — הגדירו בכפתור "יעדי אריזה"';
      }
      const pct = target>0 ? actual/target*100 : (actual>0 ? 100 : 0);
      return {facility:f, actual, target, pct, days, ruleLabel, kind:'packaging'};
    });
  }

  function packagingLineTargetNote(view){
    const info = getLineTargetInfo(view);
    if(info.target <= 0) return 'יעד לפי קווי אריזה: לא זוהו קווי אריזה מדווחים בטווח';
    const modeText = info.mode === 'manual' ? 'בחירה ידנית' : 'אוטומטי לפי סוגי האריזה שדווחו בפועל';
    return 'יעד ' + modeText + ' • ' + info.workingDays + ' ימי דיווח • יעד מחושב: ' + fmt(info.target) + ' ליטר';

  async function persist(){
    try {
      const byMonth = {};
      entries.forEach(e=>{
        const mk = entryMonthKey(e.date);
        if(!byMonth[mk]) byMonth[mk] = [];
        byMonth[mk].push(e);
      });
      const monthsNow = Object.keys(byMonth).map(k => k.slice(ENTRIES_KEY_PREFIX.length));

      let prevMonths = [];
      try {
        const idxRes = await window.storage.get(ENTRIES_INDEX_KEY, true);
        prevMonths = (idxRes && idxRes.value) ? JSON.parse(idxRes.value) : [];
      } catch(e){ prevMonths = []; }
      const monthsToDelete = prevMonths.filter(m => !monthsNow.includes(m));

      const writes = Object.keys(byMonth).map(mk =>
        window.storage.set(mk, JSON.stringify(byMonth[mk]), true)
      );
      const deletes = monthsToDelete.map(m =>
        window.storage.delete(ENTRIES_KEY_PREFIX + m, true).catch(()=>null)
      );
      const indexWrite = window.storage.set(ENTRIES_INDEX_KEY, JSON.stringify(monthsNow), true);
      // מנקים את הפורמט הישן (בלוב אחד גדול) ברגע שעברנו לפורמט המחולק, כדי לא להחזיק שני עותקים.
      const legacyClear = window.storage.delete(STORAGE_KEY, true).catch(()=>null);

      const results = await Promise.all([...writes, indexWrite, legacyClear, ...deletes]);
      if(!results || !results[0]) throw new Error('no result');
      return true;
    } catch(e){
      showToast('שגיאה בשמירת הנתונים. נסו שוב.', true);
      return false;
    }
  }

  /* ---------------- derived defaults ---------------- */
  function latestDate(){
    if(entries.length===0) return todayISO();
    return entries.reduce((max,e)=> e.date > max ? e.date : max, entries[0].date);
  }
  function yearsWithData(){
    const ys = new Set(entries.map(e=>parseInt(e.date.slice(0,4),10)));
    ys.add(new Date().getFullYear());
    return Array.from(ys).sort((a,b)=>b-a);
  }

  function effectiveDay(){ return filters.day || latestDate(); }
  function effectiveMonth(){
    if(filters.month) return filters.month;
    const d = parseISO(latestDate());
    return d.getFullYear()+'-'+pad2(d.getMonth()+1);
  }
  function effectiveYear(){
    if(filters.year) return filters.year;
    return parseISO(latestDate()).getFullYear();
  }
  function effectiveQYear(){ return filters.qYear || effectiveYear(); }
  function effectiveQQuarter(){
    if(filters.qQuarter) return filters.qQuarter;
    return Math.floor(parseISO(latestDate()).getMonth()/3)+1;
  }
  function effectivePeriod(){
    if(filters.periodStart && filters.periodEnd) return {start: filters.periodStart, end: filters.periodEnd};
    const end = parseISO(latestDate());
    const start = new Date(end); start.setDate(start.getDate()-6);
    return {start: toISO(start), end: toISO(end)};
  }

  /* ---------------- filtering & bucketing ---------------- */
  function getView(){
    const base = facilityFilteredEntries();
    if(tab === 'day'){
      const day = effectiveDay();
      const filtered = base.filter(e=>e.date===day);
      const groupByFacility = !(selectedFacilities && selectedFacilities.size===1);
      const groups = {};
      filtered.forEach(e=>{
        const key = groupByFacility ? ('מתקן '+(e.facility||'לא מוגדר')) : (e.line || 'כללי');
        if(!groups[key]) groups[key] = {label:key, production:0, packaging:0, targetProduction:0, targetPackaging:0};
        groups[key].production += e.production;
        groups[key].packaging += e.packaging;
        groups[key].targetProduction += getProductionTarget(e);
        groups[key].targetPackaging += getPackagingTarget(e);
      });
      return { filtered, buckets: Object.values(groups), rangeLabel: day };
    }
    if(tab === 'period'){
      const {start,end} = effectivePeriod();
      const s = parseISO(start), e = parseISO(end);
      const filtered = base.filter(x=> x.date>=start && x.date<=end);
      const spanDays = Math.round((e-s)/86400000)+1;
      let buckets;
      if(spanDays <= 31) buckets = bucketDaily(filtered, s, e);
      else if(spanDays <= 180) buckets = bucketWeekly(filtered, s, e);
      else buckets = bucketMonthly(filtered, s, e);
      return { filtered, buckets, rangeLabel: ddmm(s)+' – '+ddmm(e) };
    }
    if(tab === 'month'){
      const ym = effectiveMonth();
      const [y,m] = ym.split('-').map(Number);
      const s = new Date(y, m-1, 1), e = new Date(y, m, 0);
      const sISO = toISO(s), eISO = toISO(e);
      const filtered = base.filter(x=> x.date>=sISO && x.date<=eISO);
      return { filtered, buckets: bucketDaily(filtered, s, e), rangeLabel: monthsFull[m-1]+' '+y };
    }
    if(tab === 'quarter'){
      const y = effectiveQYear(), q = effectiveQQuarter();
      const startMonth = (q-1)*3;
      const s = new Date(y, startMonth, 1), e = new Date(y, startMonth+3, 0);
      const sISO = toISO(s), eISO = toISO(e);
      const filtered = base.filter(x=> x.date>=sISO && x.date<=eISO);
      return { filtered, buckets: bucketMonthly(filtered, s, e), rangeLabel: 'רבעון '+q+' '+y };
    }
    if(tab === 'year'){
      const y = effectiveYear();
      const s = new Date(y,0,1), e = new Date(y,11,31);
      const sISO = toISO(s), eISO = toISO(e);
      const filtered = base.filter(x=> x.date>=sISO && x.date<=eISO);
      return { filtered, buckets: bucketMonthly(filtered, s, e), rangeLabel: ''+y };
    }
  }

  function emptyBucket(label){ return {label, production:0, packaging:0, targetProduction:0, targetPackaging:0}; }

  function bucketDaily(filtered, start, end){
    const days = Math.round((end-start)/86400000)+1;
    const buckets = [];
    for(let i=0;i<days;i++){
      const d = new Date(start); d.setDate(d.getDate()+i);
      buckets.push(emptyBucket(ddmm(d)));
      buckets[i]._iso = toISO(d);
    }
    filtered.forEach(e=>{
      const idx = Math.round((parseISO(e.date)-start)/86400000);
      if(buckets[idx]){
        buckets[idx].production += e.production;
        buckets[idx].packaging += e.packaging;
        buckets[idx].targetProduction += getProductionTarget(e);
        buckets[idx].targetPackaging += getPackagingTarget(e);
      }
    });
    return buckets;
  }

  function bucketWeekly(filtered, start, end){
    const startSun = new Date(start); startSun.setDate(startSun.getDate()-startSun.getDay());
    const weeks = Math.ceil((end-startSun)/86400000/7);
    const buckets = [];
    for(let i=0;i<weeks;i++){
      const d = new Date(startSun); d.setDate(d.getDate()+i*7);
      buckets.push(emptyBucket(ddmm(d)));
    }
    filtered.forEach(e=>{
      const idx = Math.floor((parseISO(e.date)-startSun)/86400000/7);
      if(buckets[idx]){
        buckets[idx].production += e.production;
        buckets[idx].packaging += e.packaging;
        buckets[idx].targetProduction += getProductionTarget(e);
        buckets[idx].targetPackaging += getPackagingTarget(e);
      }
    });
    return buckets;
  }

  function bucketMonthly(filtered, start, end){
    const months = (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth()) + 1;
    const buckets = [];
    for(let i=0;i<months;i++){
      const m = (start.getMonth()+i)%12;
      const y = start.getFullYear() + Math.floor((start.getMonth()+i)/12);
      buckets.push(emptyBucket(monthsShort[m] + (months>12 ? " '"+(''+y).slice(2) : '')));
    }
    filtered.forEach(e=>{
      const d = parseISO(e.date);
      const idx = (d.getFullYear()-start.getFullYear())*12 + (d.getMonth()-start.getMonth());
      if(buckets[idx]){
        buckets[idx].production += e.production;
        buckets[idx].packaging += e.packaging;
        buckets[idx].targetProduction += getProductionTarget(e);
        buckets[idx].targetPackaging += getPackagingTarget(e);
      }
    });
    return buckets;
  }

  /* ---------------- gauge svg ---------------- */
  function gaugeColor(pct){
    if(pct >= 100) return 'var(--green)';
    if(pct >= 75) return 'var(--yellow)';
    return 'var(--red)';
  }
  function gaugeLabel(pct){
    if(pct >= 100) return 'ok';
    if(pct >= 75) return 'warn';
    return 'bad';
  }
  function deltaLabel(actual, target){
    if(!target || target<=0) return '';
    const diff = Math.round((actual/target*100) - 100);
    if(diff > 0) return '▲ '+diff+'% מעל היעד';
    if(diff < 0) return '▼ '+Math.abs(diff)+'% מתחת ליעד';
    return '● בדיוק על היעד';
  }

  function buildGaugeSVG(pct, identityColor){
    identityColor = identityColor || 'var(--text-muted)';
    const safePct = isFinite(pct) ? pct : 0;
    const scaleMax = safePct > 100 ? Math.ceil((safePct+10)/10)*10 : 100;
    const targetPos = clamp((100/scaleMax)*100, 0, 100);
    const actualPos = clamp((safePct/scaleMax)*100, 0, 100);
    const cx=90, cy=90, r=66, needleLen=50;
    const angleOf = p => (180 - (p/100*180));
    const pointAt = (p, radius) => {
      const a = angleOf(p) * Math.PI/180;
      return [cx + radius*Math.cos(a), cy - radius*Math.sin(a)];
    };
    const [nx, ny] = pointAt(actualPos, needleLen);
    let ticks = '';
    [{p:0,major:false},{p:targetPos,major:true},{p:100,major:false}].forEach(t=>{
      const [x1,y1] = pointAt(t.p, r+2);
      const [x2,y2] = pointAt(t.p, r+12);
      const col = t.major ? 'var(--text)' : 'var(--border)';
      const w = t.major ? 3 : 2;
      ticks += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+w+'"/>';
    });
    const statusColor = gaugeColor(safePct);
    const pathD = 'M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy;
    const targetDash = (targetPos*2.07).toFixed(1);
    const actualDash = (actualPos*2.07).toFixed(1);
    return ''+
      '<svg class="gauge-svg" viewBox="0 0 180 105" dir="ltr">'+
        '<path d="'+pathD+'" fill="none" stroke="var(--panel-2)" stroke-width="14" stroke-linecap="round"/>'+
        '<path d="'+pathD+'" fill="none" stroke="'+identityColor+'" stroke-opacity="0.32" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+targetDash+' 400"/>'+
        '<path d="'+pathD+'" fill="none" stroke="'+statusColor+'" stroke-width="14" stroke-linecap="round" stroke-dasharray="'+actualDash+' 400"/>'+
        ticks+
        '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="var(--text-muted)"/>'+
        '<line x1="'+cx+'" y1="'+cy+'" x2="'+nx+'" y2="'+ny+'" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/>'+
        '<text x="'+cx+'" y="62" text-anchor="middle" class="gauge-pct" font-size="24" fill="'+statusColor+'">'+Math.round(safePct)+'%</text>'+
      '</svg>';
  }

  /* ---------------- trend chart svg ---------------- */
  function buildChartSVG(buckets){
    if(buckets.length===0 || buckets.every(b=>b.production===0 && b.packaging===0)){
      return '<div class="chart-empty">אין נתונים להצגה בטווח שנבחר</div>';
    }
    const W = Math.max(560, buckets.length*46), H=250, padL=46, padB=30, padT=12, padR=10;
    const plotW = W-padL-padR, plotH = H-padT-padB;
    const maxVal = Math.max(1, ...buckets.flatMap(b=>[b.production,b.packaging])) * 1.15;
    const groupW = plotW/buckets.length;
    const barW = Math.min(26, groupW*0.34);
    const gap = barW*0.18;
    let bars='', labels='', grid='';
    [0,0.25,0.5,0.75,1].forEach(f=>{
      const y = padT + plotH - plotH*f;
      grid += '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>';
      grid += '<text x="'+(padL-8)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="var(--text-muted)" font-family="JetBrains Mono, monospace">'+fmt(maxVal*f)+'</text>';
    });
    const rotate = buckets.length > 14;
    buckets.forEach((b,i)=>{
      const groupX = padL + i*groupW + groupW/2;
      const h1 = (b.production/maxVal)*plotH, h2=(b.packaging/maxVal)*plotH;
      const x1 = groupX - barW - gap/2, x2 = groupX + gap/2;
      bars += '<rect class="trend-bar" data-bucket-index="'+i+'" data-metric="production" x="'+x1+'" y="'+(padT+plotH-h1)+'" width="'+barW+'" height="'+Math.max(h1,0)+'" rx="2" fill="var(--amber)" style="cursor:pointer;"/>';
      bars += '<rect class="trend-bar" data-bucket-index="'+i+'" data-metric="packaging" x="'+x2+'" y="'+(padT+plotH-h2)+'" width="'+barW+'" height="'+Math.max(h2,0)+'" rx="2" fill="var(--teal)" style="cursor:pointer;"/>';
      const ly = H-padB+14;
      if(rotate){
        labels += '<text x="'+groupX+'" y="'+ly+'" text-anchor="end" font-size="10" fill="var(--text-muted)" transform="rotate(-40 '+groupX+' '+ly+')">'+b.label+'</text>';
      } else {
        labels += '<text x="'+groupX+'" y="'+ly+'" text-anchor="middle" font-size="10.5" fill="var(--text-muted)">'+b.label+'</text>';
      }
    });
    return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+grid+bars+labels+'</svg>';
  }
