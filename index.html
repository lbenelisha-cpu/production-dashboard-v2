  function openFacilityDrilldown(facility, kind, view){
    const overlay = root.querySelector('#facilityDrilldownOverlay');
    if(!overlay) return;
    const allRows = (view && view.filtered) || [];
    const facRows = allRows.filter(e => String(e.facility||'') === String(facility));
    const metric = kind === 'packaging' ? 'packaging' : 'production';
    const metricLabel = kind === 'packaging' ? 'אריזה (ליטר)' : 'ייצור (יח׳)';
    const color = kind === 'packaging' ? 'var(--teal)' : 'var(--amber)';
    const total = facRows.reduce((s,e)=>s+(Number(e[metric])||0),0);
    const daysWithData = new Set(facRows.filter(e=>Number(e[metric]||0)>0).map(e=>e.date)).size;
    const avg = daysWithData > 0 ? Math.round(total / daysWithData) : 0;
    const dailyTarget = kind === 'packaging' ? dailyPackagingTargetForFacility(facility) : dailyProductionTargetForFacility(facility);

    const byDate = {};
    facRows.forEach(e=>{
      const d = e.date || '';
      if(!d) return;
      if(!byDate[d]) byDate[d] = {date:d, label:ddmm(parseISO(d)), production:0, packaging:0, count:0};
      byDate[d].production += Number(e.production)||0;
      byDate[d].packaging += Number(e.packaging)||0;
      byDate[d].count++;
    });
    const dailyRows = Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
    const bestDay = dailyRows.length ? dailyRows.reduce((best,r)=> (Number(r[metric])||0) > (Number(best[metric])||0) ? r : best, dailyRows[0]) : null;
    const worstDay = dailyRows.filter(r=>Number(r[metric]||0)>0).length ?
      dailyRows.filter(r=>Number(r[metric]||0)>0).reduce((w,r)=> (Number(r[metric])||0) < (Number(w[metric])||0) ? r : w, dailyRows.filter(r=>Number(r[metric]||0)>0)[0]) : null;

    const shiftTotals = {'בוקר':0, 'ערב':0, 'לילה':0};
    const shiftCounts = {'בוקר':0, 'ערב':0, 'לילה':0};
    let unknownShiftTotal = 0, unknownShiftCount = 0;
    facRows.forEach(e=>{
      const v = Number(e[metric])||0;
      if(!v) return;
      const sh = e.shift && SHIFTS.includes(e.shift) ? e.shift : null;
      if(sh){
        shiftTotals[sh] = (shiftTotals[sh]||0) + v;
        shiftCounts[sh] = (shiftCounts[sh]||0) + 1;
      } else {
        unknownShiftTotal += v;
        unknownShiftCount++;
      }
    });
    const shiftMax = Math.max(1, ...Object.values(shiftTotals), unknownShiftTotal);

    const qRowsAll = Object.values(qualitySummary || {}).filter(q => facRows.some(e => qualityMatchesPackaging(q, e)));
    const qGoodAll = qRowsAll.filter(q=>q.worst==='ok').length;
    const qTotal = qRowsAll.length;

    const titleLabel = 'מתקן ' + facility + (kind==='packaging' ? ' — אריזה' : ' — ייצור');
    const pct = dailyTarget > 0 ? Math.round(total / (dailyTarget * Math.max(daysWithData,1)) * 100) : 0;

    let html = '<div class="facility-drilldown-header">'+
      '<button class="back-btn" id="drilldownBack">← חזרה ללוח הבקרה</button>'+
      '<div><h2>'+escapeHtml(titleLabel)+'</h2>'+
      '<div class="kpi-sub">טווח: '+escapeHtml(view.rangeLabel||'')+' · '+facRows.length+' רשומות</div></div>'+
    '</div>'+
    '<div class="drilldown-body">';

    // Summary stats
    html += '<div class="drilldown-stat-grid">'+
      '<div class="kpi-card num" style="border-top:3px solid '+color+'"><div class="kpi-label">סה״כ '+metricLabel+'</div><span class="kpi-num">'+fmt(total)+'</span></div>'+
      '<div class="kpi-card num"><div class="kpi-label">ממוצע יומי</div><span class="kpi-num">'+fmt(avg)+'</span><div class="kpi-sub">'+daysWithData+' ימי דיווח</div></div>'+
      '<div class="kpi-card num" style="border-top:3px solid '+(pct>=100?'var(--green)':pct>=75?'var(--yellow)':'var(--red)')+'"><div class="kpi-label">עמידה ביעד</div><span class="kpi-num">'+pct+'%</span><div class="kpi-sub">יעד יומי: '+fmt(dailyTarget)+'</div></div>'+
      '<div class="kpi-card num"><div class="kpi-label">מנות איכות</div><span class="kpi-num">'+qTotal+'</span><div class="kpi-sub" style="color:var(--green)">'+qGoodAll+' תקינות</div></div>'+
    '</div>';

    // Daily chart — clickable bars
    html += '<div class="panel" style="margin-bottom:16px;">'+
      '<div class="panel-head"><div class="panel-title">כמות לפי יום</div>'+
      '<div class="legend"><span><span class="dot" style="background:'+color+'"></span>'+metricLabel+'</span>'+
      '<span style="color:var(--text-muted); font-size:11px; margin-right:8px;">לחץ על עמודה לפירוט היום</span></div></div>'+
      '<div class="chart-wrap">'+buildFacilityDrilldownChart(dailyRows, metric, 220)+'</div>'+
    '</div>';

    // Day detail placeholder (filled on bar click)
    html += '<div id="dayDetailSection"></div>';

    // Shift breakdown
    html += '<div class="panel" style="margin-bottom:16px;"><div class="panel-head"><div class="panel-title">פירוט לפי משמרת</div>'+
      '<div class="kpi-sub">בוקר 07:00-15:00 · ערב 15:00-23:00 · לילה 23:00-07:00</div></div>'+
      '<div class="shift-grid">';
    ['בוקר','ערב','לילה'].forEach(sh=>{
      const v = shiftTotals[sh] || 0;
      const cnt = shiftCounts[sh] || 0;
      const w = Math.round(v / shiftMax * 100);
      const shPct = total > 0 ? Math.round(v/total*100) : 0;
      html += '<div class="kpi-card"><div class="kpi-label">משמרת '+escapeHtml(sh)+'</div>'+
        '<div class="kpi-num mono" style="font-size:22px; direction:ltr; text-align:right;">'+fmt(v)+'</div>'+
        '<div style="height:8px; background:var(--panel-2); border-radius:999px; margin:8px 0; overflow:hidden;"><div style="height:100%; width:'+w+'%; background:'+color+'; border-radius:999px;"></div></div>'+
        '<div class="kpi-sub">'+shPct+'% מסך הכמות · '+cnt+' רשומות</div>'+
      '</div>';
    });
    // אם יש רשומות ללא מידע משמרת — מציגים הודעה ומנחים לייבוא מחדש
    if(unknownShiftCount > 0){
      const unknownPct = total > 0 ? Math.round(unknownShiftTotal/total*100) : 0;
      html += '<div class="kpi-card" style="margin-top:8px; border-color:var(--yellow); background:rgba(232,197,71,0.07);">'+
        '<div class="kpi-label" style="color:var(--yellow);">⚠️ '+unknownShiftCount+' רשומות ללא נתוני משמרת ('+unknownPct+'% מהכמות)</div>'+
        '<div class="kpi-sub" style="margin-top:6px;">רשומות אלו יובאו לפני שנוסף זיהוי משמרת אוטומטי. '+
        '<strong>ייבא מחדש את קובץ ה-SAP</strong> כדי לקבל חלוקה מלאה לפי משמרות — עמודת "Actual Finish Time" תשמש לזיהוי אוטומטי של המשמרת.</div>'+
      '</div>';
    }
    html += '</div></div>';

    // Best/worst days
    if(bestDay || worstDay){
      html += '<div class="insight-stats" style="margin-bottom:16px;">'+
        (bestDay ? '<div class="kpi-card" style="cursor:pointer;" data-goto-date="'+escapeHtml(bestDay.date)+'"><div class="kpi-label">🏆 יום הכי טוב</div><div class="kpi-num mono" style="font-size:22px; direction:ltr; text-align:right;">'+fmt(Number(bestDay[metric])||0)+'</div><div class="kpi-sub">'+escapeHtml(bestDay.date)+' · לחץ לפירוט</div></div>' : '')+
        (worstDay ? '<div class="kpi-card" style="cursor:pointer;" data-goto-date="'+escapeHtml(worstDay.date)+'"><div class="kpi-label">⚠️ יום הכי חלש</div><div class="kpi-num mono" style="font-size:22px; direction:ltr; text-align:right;">'+fmt(Number(worstDay[metric])||0)+'</div><div class="kpi-sub">'+escapeHtml(worstDay.date)+' · לחץ לפירוט</div></div>' : '')+
      '</div>';
    }

    html += '</div>'; // end drilldown-body

    overlay.innerHTML = html;
    overlay.classList.add('open');
    overlay.scrollTop = 0;

    overlay.querySelector('#drilldownBack').onclick = ()=>{ overlay.classList.remove('open'); };

    // Wire bar clicks
    overlay.querySelectorAll('.drilldown-bar').forEach(bar=>{
      bar.onclick = ()=>{
        const date = bar.dataset.date;
        if(date) renderDayDetail(date, facRows, overlay);
      };
    });

    // Wire best/worst day card clicks
    overlay.querySelectorAll('[data-goto-date]').forEach(card=>{
      card.onclick = ()=>{
        const date = card.dataset.gotoDate;
        if(date) renderDayDetail(date, facRows, overlay);
      };
    });
  }

  function facilityViewMode(){
    if(selectedFacilities === null) return 'both';
    const arr = Array.from(selectedFacilities);
    if(arr.length === 0) return 'both';
    const allPackagingOnly = arr.every(f=>PACKAGING_ONLY_FACILITIES.includes(f));
    const allProduction = arr.every(f=>!PACKAGING_ONLY_FACILITIES.includes(f));
    if(allPackagingOnly) return 'packaging';
    if(allProduction) return 'production';
    return 'both';
  }

  function renderKPIs(view){
    const totalProd = view.filtered.reduce((s,e)=>s+e.production,0);
    const totalPack = view.filtered.reduce((s,e)=>s+e.packaging,0);
    const targetProd = view.filtered.reduce((s,e)=>s+getProductionTarget(e),0);
    const targetPack = getEffectivePackagingTarget(view);
    const pctProd = targetProd>0 ? (totalProd/targetProd*100) : (totalProd>0?100:0);
    const pctPack = targetPack>0 ? (totalPack/targetPack*100) : (totalPack>0?100:0);

    const mode = facilityViewMode();

    kpi.classList.toggle('mode-2col', mode!=='both');

    const productionCards =
      '<div class="kpi-card num production">'+
        '<div class="kpi-label">סה״כ ייצור (יח׳)</div>'+
        '<span class="kpi-num">'+fmt(totalProd)+'</span>'+
        '<div class="kpi-sub">סיכום ייצור בטווח הנבחר</div>'+
      '</div>';
    const packagingCards =
      '<div class="kpi-card num packaging">'+
        '<div class="kpi-label">סה״כ אריזה (יח׳)</div>'+
        '<span class="kpi-num">'+fmt(totalPack)+'</span>'+
        '<div class="kpi-sub">'+(targetPack>0 ? 'מתוך יעד <span class="mono">'+fmt(targetPack)+'</span>' : 'לא הוגדר יעד לטווח זה')+'</div>'+

  function renderOperationalInsights(view){
    const container = root.querySelector('#operationalInsights');
    const rows = view.filtered;
    if(rows.length===0){ container.innerHTML=''; return; }

    const hasStatusData = rows.some(e=>e.systemStatus);
    const hasYieldData = rows.some(e=>e.confirmedYield>0);
    const pendingTotal = rows.reduce((s,e)=>s+pendingPackagingQty(e),0);
    const closedCount = rows.filter(isOrderClosed).length;
    const openCount = rows.filter(e=>e.systemStatus && !isOrderClosed(e)).length;
    const shortfallRows = rows.filter(e=>orderShortfall(e)>0);

    let html = '';

    if(hasStatusData || hasYieldData){
      html += '<div class="insight-stats">';
      if(hasYieldData){
        html += '<div class="kpi-card num">'+
          '<div class="kpi-label">ממתין לאריזה / הוצאה</div>'+
          '<span class="kpi-num">'+fmt(pendingTotal)+'</span>'+
          '<div class="kpi-sub">יוצר אך עדיין לא נמסר במלואו</div>'+
        '</div>';
      }
      if(hasStatusData){
        html += '<div class="kpi-card num">'+
          '<div class="kpi-label">הזמנות סגורות (TECO)</div>'+
          '<span class="kpi-num">'+closedCount+'</span>'+
        '</div>';
        html += '<div class="kpi-card num">'+
          '<div class="kpi-label">הזמנות פתוחות</div>'+
          '<span class="kpi-num">'+openCount+'</span>'+

    }

      html += '<div class="panel" style="margin-bottom:16px;">'+
        '<div class="panel-head"><div><div class="panel-title">הזמנות עם פער בין מתוכנן לנמסר</div><div class="kpi-sub">נמצאו '+fmt(shortfallRows.length)+' הזמנות עם פער</div></div><button class="panel-toggle-btn" id="toggleShortfallBtn">'+(orderShortfallExpanded?'הסתר פירוט':'הצג פירוט')+'</button></div>';

        shortfallRows.forEach(e=>{

          const gap = orderShortfall(e);

            '<td>'+ (getQualityForPackaging(e) ? '<span class="quality-badge '+getQualityForPackaging(e).worst+'">'+qualityLabel(getQualityForPackaging(e).worst)+'</span>' : '<span class="quality-badge ok">אין חריגה</span>') +'</td>'+

  function calcAdvancedSummary(view){
    const rows = view.filtered || [];
    const totalPack = rows.reduce((s,e)=>s+(Number(e.packaging)||0),0);
    const targetPack = getEffectivePackagingTarget(view);
    const pctPack = targetPack>0 ? totalPack/targetPack*100 : (totalPack>0 ? 100 : 0);
    const closedOrders = rows.filter(isOrderClosed).length;
    const openOrders = rows.filter(e=>e.systemStatus && !isOrderClosed(e)).length;
    const qRows = Object.values(qualitySummary || {}).filter(q => rows.some(e => qualityMatchesPackaging(q, e)));
    const goodLots = qRows.filter(q=>q.worst==='ok').length;
    const badLots = qRows.filter(q=>q.worst==='bad').length;
    const conditionalLots = qRows.filter(q=>q.worst==='conditional').length;
    const totalQualityLots = qRows.length;
    const targetInfo = getLineTargetInfo(view);
    const typeRows = targetInfo.typeRows.map(r=>({label:r.type, actual:r.actual, target:r.target, days:r.daysCount, utilization:r.utilization}));
    const untypedActual = rows.reduce((s,e)=>s+(!e.packagingType && Number(e.packaging||0)>0 ? Number(e.packaging)||0 : 0),0);
    if(untypedActual>0) typeRows.push({label:'ללא סוג מוגדר', actual:untypedActual, target:0, days:0, utilization:100});
    return {rows,totalPack,targetPack,pctPack,closedOrders,openOrders,qRows,goodLots,badLots,conditionalLots,totalQualityLots,typeRows,targetInfo};
  }

  function buildQualityTrendSVG(trendData){
    if(!trendData || trendData.length===0) return '<div class="chart-empty">אין נתוני מגמה</div>';
    const W = Math.max(520, trendData.length*56), H=170, padL=36, padR=12, padT=12, padB=28;
    const plotW = W-padL-padR, plotH = H-padT-padB;
    const maxVal = Math.max(1, ...trendData.map(d=>d.ok+d.warn+d.bad)) * 1.2;
    const step = trendData.length>1 ? plotW/(trendData.length-1) : plotW;
    let grid='', labelsHtml='', lines={ok:'',warn:'',bad:''}, circles='';
    [0,0.5,1].forEach(f=>{
      const y = padT + plotH - plotH*f;
      grid += '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>';
      grid += '<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="var(--text-muted)">'+Math.round(maxVal*f)+'</text>';
    });
    const colors = { ok:'var(--green)', warn:'var(--yellow)', bad:'var(--red)' };
    trendData.forEach((d,i)=>{
      const x = padL + (trendData.length===1 ? plotW/2 : i*step);
      ['ok','warn','bad'].forEach(k=>{
        const y = padT + plotH - (d[k]/maxVal)*plotH;
        lines[k] += (i?' L ':'M ') + x + ' ' + y;
        circles += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+colors[k]+'" opacity="0.9"/>';
      });
      if(i%Math.ceil(trendData.length/10)===0 || trendData.length<=10)
        labelsHtml += '<text x="'+x+'" y="'+(H-9)+'" text-anchor="middle" font-size="10" fill="var(--text-muted)">'+escapeHtml(d.label)+'</text>';
    });
    let svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%; max-width:'+W+'px; height:'+H+'px;">'+grid;
    Object.entries(lines).forEach(([k,pts])=>{
      svg += '<path d="'+pts+'" fill="none" stroke="'+colors[k]+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
    });
    svg += circles + labelsHtml + '</svg>';
    return '<div class="table-scroll" style="padding-bottom:4px;">'+svg+'</div>';
  }

  function buildTrendLineSVG(buckets, field){
    const vals = (buckets || []).map(b=>Number(b[field])||0);
    if(vals.length===0 || vals.every(v=>v===0)) return '<div class="chart-empty">אין נתונים למגמה בטווח הנבחר</div>';
    const W = Math.max(520, vals.length*46), H=170, padL=42, padR=12, padT=12, padB=28;
    const plotW = W-padL-padR, plotH = H-padT-padB;
    const maxVal = Math.max(1, ...vals) * 1.15;
    const step = vals.length>1 ? plotW/(vals.length-1) : plotW;
    let pts = '', circles = '', labels = '', grid = '';
    [0,0.5,1].forEach(f=>{
      const y = padT + plotH - plotH*f;
      grid += '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>';
      grid += '<text x="'+(padL-8)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="var(--text-muted)" font-family="JetBrains Mono, monospace">'+fmt(maxVal*f)+'</text>';
    });
    vals.forEach((v,i)=>{
      const x = padL + (vals.length===1 ? plotW/2 : i*step);
      const y = padT + plotH - (v/maxVal)*plotH;
      pts += (i?' L ':'M ') + x + ' ' + y;
      circles += '<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="var(--teal)"/>';
      const label = (buckets[i] && buckets[i].label) ? buckets[i].label : '';
      if(i%Math.ceil(vals.length/10)===0 || vals.length<=10) labels += '<text x="'+x+'" y="'+(H-9)+'" text-anchor="middle" font-size="10" fill="var(--text-muted)">'+escapeHtml(label)+'</text>';
    });
    return '<svg class="trend-line" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+grid+'<path d="'+pts+'" fill="none" stroke="var(--teal)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'+circles+labels+'</svg>';
  }

  function numberValue(v){

  function excelSafe(v){
    if(v === undefined || v === null) return '';
    if(typeof v === 'string' && v.startsWith('=')) return "'" + v;
    return v;
  }

  function addSheetFromRows(wb, name, rows, headers, options){
    const data = [headers].concat((rows || []).map(r => headers.map(h => excelSafe(r[h]))));
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = headers.map(h => ({wch: Math.min(Math.max(String(h).length + 4, 12), 34)}));
    ws['!autofilter'] = {ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:Math.max(data.length-1,0), c:Math.max(headers.length-1,0)}})};
    ws['!freeze'] = {xSplit:0, ySplit:1};
    applyExcelDesign(ws, data.length, headers.length, options || {});
    XLSX.utils.book_append_sheet(wb, ws, name.substring(0,31));
    return ws;
  }

  function excelCell(ws, r, c){
    const addr = XLSX.utils.encode_cell({r:r, c:c});
    if(!ws[addr]) ws[addr] = {t:'s', v:''};
    return ws[addr];
  }

  function pctStatusColor(v){
    const n = Number(v || 0);
    if(n >= 100) return 'C6EFCE';
    if(n >= 75) return 'FFEB9C';
    return 'FFC7CE';
  }

  function pctStatusText(v){
    const n = Number(v || 0);
    if(n >= 100) return '🟢 עמידה מלאה';
    if(n >= 75) return '🟡 קרוב ליעד';
    return '🔴 מתחת ליעד';
  }

  function progressBar(actual, target){
    const a = Number(actual || 0), t = Number(target || 0);
    if(!t || t <= 0) return '';
    const pct = Math.max(0, Math.min(1, a/t));
    const full = Math.round(pct * 20);
    return '█'.repeat(full) + '░'.repeat(20-full) + ' ' + Math.round(a/t*100) + '%';
  }

  function applyExcelDesign(ws, rowCount, colCount, options){
    const headerFill = options.headerFill || '1F4E78';
    const zebraFill = options.zebraFill || 'F3F6FA';
    const headerFont = {bold:true, color:{rgb:'FFFFFF'}};
    const thinBorder = {top:{style:'thin', color:{rgb:'D9E2F3'}}, bottom:{style:'thin', color:{rgb:'D9E2F3'}}, left:{style:'thin', color:{rgb:'D9E2F3'}}, right:{style:'thin', color:{rgb:'D9E2F3'}}};
    for(let c=0;c<colCount;c++){
      const cell = excelCell(ws, 0, c);
      cell.s = {font:headerFont, fill:{fgColor:{rgb:headerFill}}, alignment:{horizontal:'center', vertical:'center', wrapText:true}, border:thinBorder};
    }
    for(let r=1;r<rowCount;r++){
      for(let c=0;c<colCount;c++){
        const cell = excelCell(ws, r, c);
        cell.s = {alignment:{horizontal:'right', vertical:'center', wrapText:true}, border:thinBorder};
        if(r % 2 === 0) cell.s.fill = {fgColor:{rgb:zebraFill}};
        const v = cell.v;
        if(typeof v === 'string' && (v.includes('🔴') || v.includes('חריגה') || v.includes('מתחת'))){
          cell.s.fill = {fgColor:{rgb:'FFC7CE'}}; cell.s.font = {color:{rgb:'9C0006'}, bold:true};
        } else if(typeof v === 'string' && (v.includes('🟡') || v.includes('🟠') || v.includes('מותנה') || v.includes('קרוב'))){
          cell.s.fill = {fgColor:{rgb:'FFEB9C'}}; cell.s.font = {color:{rgb:'9C6500'}, bold:true};
        } else if(typeof v === 'string' && (v.includes('🟢') || v.includes('עמידה מלאה') || v.includes('תקין'))){
          cell.s.fill = {fgColor:{rgb:'C6EFCE'}}; cell.s.font = {color:{rgb:'006100'}, bold:true};
        }
      }
    }
  }

  function buildFacilityScoreRows(view, summary){
    const byFac = {};
    (view.filtered || []).forEach(e=>{
      const f = e.facility || 'לא מוגדר';
      if(!byFac[f]) byFac[f] = {facility:f, production:0, packaging:0, targetPackaging:0, targetProduction:0, rows:0, closed:0, open:0, qualityTotal:0, qualityGood:0, qualityPending:0, qualityBad:0};
      const g = byFac[f];
      g.rows++;
      g.production += numberValue(e.production);
      g.packaging += numberValue(e.packaging);
      g.targetPackaging += getPackagingTarget(e);
      g.targetProduction += getProductionTarget(e);
      if(isOrderClosed(e)) g.closed++;
      else if(e.systemStatus) g.open++;
    });
    (summary.qRows || []).forEach(q=>{
      const f = q.facility || 'לא מוגדר';
      if(!byFac[f]) byFac[f] = {facility:f, production:0, packaging:0, targetPackaging:0, targetProduction:0, rows:0, closed:0, open:0, qualityTotal:0, qualityGood:0, qualityPending:0, qualityBad:0};
      const g = byFac[f];
      g.qualityTotal++;
      if(q.worst === 'bad') g.qualityBad++;
      else if(q.worst === 'conditional') g.qualityPending++;
      else g.qualityGood++;
    });
    const facilityTargets = {};
    facilityTargetRowsForView(view).forEach(r=>{ facilityTargets[r.facility] = r; });
    return Object.values(byFac).map(g=>{
      const configured = facilityTargets[g.facility];
      const target = configured ? configured.target : (g.targetPackaging || g.targetProduction || 0);
      const actualForTarget = configured ? configured.actual : (g.packaging || g.production || 0);
      const achievement = target>0 ? actualForTarget/target*100 : (actualForTarget>0 ? 100 : 0);
      const qualityPct = g.qualityTotal>0 ? g.qualityGood/g.qualityTotal*100 : 100;
      const outputScore = Math.min(100, achievement);
      const qualityScore = Math.max(0, qualityPct - (g.qualityBad*10));
      const score = Math.round(outputScore*0.40 + Math.min(100, achievement)*0.30 + Math.min(100, qualityScore)*0.30);
      const status = score>=90 ? '🟢 מצוין' : (score>=75 ? '🟡 דורש מעקב' : '🔴 לטיפול');
      return Object.assign(g, {achievement, qualityPct, score, status});
    }).sort((a,b)=>b.score-a.score);
  }

  function makeSafeFileName(name){
    return String(name || 'report.xlsx').replace(/[\\/:*?"<>|]+/g, '_');
  }

  function saveDownloadHistory(fileName, url, type){
    try{
      const key = 'generated_reports_history_v1';
      const list = JSON.parse(localStorage.getItem(key) || '[]');
      list.unshift({fileName:fileName, url:url, type:type || 'Excel', createdAt:new Date().toLocaleString('he-IL')});
      localStorage.setItem(key, JSON.stringify(list.slice(0,12)));
    }catch(e){}
  }

  function showFileDownloadDialog(fileName, blob, mimeType){
    // הורדה אמיתית כקובץ Excel: יוצרים Blob/File מסוג XLSX ולא קישור לעמוד HTML.
    const excelMime = mimeType || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
    let safeName = makeSafeFileName(fileName || 'dashboard_report.xlsx');
    if(!/\.xlsx$/i.test(safeName)) safeName += '.xlsx';
    const url = URL.createObjectURL(blob);
    saveDownloadHistory(safeName, url, 'Excel XLSX');

    const old = root.querySelector('#downloadReadyOverlay');
    if(old) old.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay open';
    overlay.id = 'downloadReadyOverlay';
    overlay.innerHTML = ''+
      '<div class="modal" style="max-width:590px;">'+
        '<h3>✅ דוח Excel מוכן להורדה</h3>'+ 
        '<div class="wa-preview" style="max-height:none; line-height:1.8;">'+
          '<b>סוג הקובץ:</b> Excel רגיל ‎.xlsx<br>'+ 
          '<b>שם הקובץ:</b><br><span class="mono">'+escapeHtml(safeName)+'</span><br><br>'+

          'אם לוחצים על הורדה והטלפון מוריד HTML — השתמש בכפתור השיתוף, הוא שומר את הקובץ כ‑XLSX אמיתי.'+
        '</div>'+ 
        '<div class="modal-foot" style="justify-content:flex-start; flex-wrap:wrap;">'+
          '<button class="btn primary" id="shareReportFile">📤 שתף / שמור כקובץ Excel</button>'+ 
          '<a class="btn secondary" id="directDownloadReport" href="'+url+'" download="'+escapeHtml(safeName)+'" type="'+excelMime+'">📥 הורד XLSX</a>'+ 
          '<button class="btn secondary" id="copyReportName">📋 העתק שם קובץ</button>'+ 
          '<button class="btn secondary" id="closeDownloadDialog">סגור</button>'+ 
        '</div>'+ 
        '<div class="shared-note">באייפון: Files / קבצים. באנדרואיד: Downloads / הורדות. הקובץ צריך להסתיים ב‑.xlsx.</div>'+ 
      '</div>';
    root.appendChild(overlay);

    const downloadLink = overlay.querySelector('#directDownloadReport');
    const shareBtn = overlay.querySelector('#shareReportFile');
    const copyBtn = overlay.querySelector('#copyReportName');
    const closeBtn = overlay.querySelector('#closeDownloadDialog');

    shareBtn.onclick = async ()=>{
      try{
        const file = new File([blob], safeName, {type: excelMime});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({title:'דוח ייצור ואריזה', text:'מצורף דוח Excel בפורמט XLSX', files:[file]});
          showToast('נפתח שיתוף קובץ Excel');
        } else {
          downloadLink.click();
          showToast('שיתוף קובץ לא נתמך — הופעלה הורדת XLSX');
        }
      } catch(e){
        downloadLink.click();
        showToast('לא ניתן לשתף ישירות — הופעלה הורדת XLSX');
      }
    };

    copyBtn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(safeName);
        showToast('שם הקובץ הועתק');
      }catch(e){ showToast(safeName); }
    };
    closeBtn.onclick = ()=>{
      overlay.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 30000);
    };
    overlay.onclick = e=>{ if(e.target === overlay){ closeBtn.click(); } };
  }

  function writeWorkbookForMobile(wb, fileName){

    const out = XLSX.write(wb, {bookType:'xlsx', type:'array', compression:true});

    showFileDownloadDialog(safeName, blob, mime);

      addSheetFromRows(wb, 'הזמנות', orderRows, ['תאריך','מתקן','פקודת עבודה','שם חומר','Order Type','סטטוס מערכת','סגורה TECO','כמות הזמנה','נמסר/בוצע','פער','Confirmed Yield','ממתין לאריזה/הוצאה']);

      addSheetFromRows(wb, 'איכות', summary.qRows.map(q=>({

        'Batch':q.batch || '', 'Inspection Lot':q.inspectionLot || '', 'שם חומר':q.materialName || '', 'Order Type':q.orderType || '',
        'כמות בקובץ איכות':Math.round(numberValue(q.deliveredQuantity)), 'בדיקות':Math.round(numberValue(q.totalTests)),
        'Rejected chars':Math.round(numberValue(q.rejections)), 'Restricted':Math.round(numberValue(q.restricted)),
        'Contaminated':Math.round(numberValue(q.contaminated)), 'הערות / דוגמאות':(q.examples || []).join(' ; ')
      })), ['סטטוס','תאריך','מתקן','פקודת עבודה','Batch','Inspection Lot','שם חומר','Order Type','כמות בקובץ איכות','בדיקות','Rejected chars','Restricted','Contaminated','הערות / דוגמאות']);

      addSheetFromRows(wb, 'אירועי איכות וסביבה', eventRowsForExport.map(ev=>({
        'תאריך':ev.date || '', 'סוג':eventTypeLabel(ev.type), 'מתקן':ev.facility || '', 'קו/אזור':ev.area || '',
        'פקודת עבודה':ev.workOrder || '', 'Batch':ev.batch || '', 'חומרה':ev.severity || '',
        'תיאור':ev.description || '', 'פעולה מתקנת':ev.action || ''
      })), ['תאריך','סוג','מתקן','קו/אזור','פקודת עבודה','Batch','חומרה','תיאור','פעולה מתקנת'], {headerFill:'8064A2'});

      addSheetFromRows(wb, 'מגמה', (view.buckets || []).map(b=>{
        const pctP = b.targetProduction>0 ? Math.round(numberValue(b.production)/numberValue(b.targetProduction)*100) : '';
        const pctA = b.targetPackaging>0 ? Math.round(numberValue(b.packaging)/numberValue(b.targetPackaging)*100) : '';
        return {
          'תקופה':b.label || '', 'ייצור':Math.round(numberValue(b.production)), 'אריזה':Math.round(numberValue(b.packaging)),
          'יעד ייצור':Math.round(numberValue(b.targetProduction)), 'יעד אריזה':Math.round(numberValue(b.targetPackaging)),
          'עמידה ייצור %':pctP, 'עמידה אריזה %':pctA,
          'סטטוס אריזה': pctA!=='' ? pctStatusText(pctA) : '', 'מחוון אריזה': progressBar(b.packaging, b.targetPackaging)
        };
      }), ['תקופה','ייצור','אריזה','יעד ייצור','יעד אריזה','עמידה ייצור %','עמידה אריזה %','סטטוס אריזה','מחוון אריזה'], {headerFill:'70AD47'});

      addExcelChartDataSheets(wb, view, summary, facilityRowsForExport);

      const fileName = 'dashboard_analyzed_' + (tab || 'view') + '_' + todayISO() + '.xlsx';
      writeWorkbookForMobile(wb, fileName);
      showToast('הדוח נוצר — ניתן להוריד או לשתף מהחלון שנפתח');
    } catch(err){
      console.error('Excel analyzed export error:', err);
      showToast('שגיאה ביצוא הנתונים לאקסל', true);
    }
  }


  function buildWhatsAppSnapshotElement(view, summary){
    const shot = document.createElement('div');
    shot.className = 'wa-shot';
    const qTotal = summary.totalQualityLots || summary.qRows.length || 0;
    const targetInfo = summary.targetInfo || {workingDays:0, mode:''};
    const qGoodPct = qTotal ? Math.round((summary.goodLots || 0) / qTotal * 100) : 0;
    const maxType = Math.max(1, ...((summary.typeRows || []).map(r=>Number(r.actual)||0)));
    const statusColor = summary.pctPack >= 100 ? 'var(--green)' : (summary.pctPack >= 85 ? 'var(--yellow)' : 'var(--red)');
    const typeHtml = (summary.typeRows || []).length ?
      '<div class="wa-shot-bars">' + summary.typeRows.map(r=>{
        const actual = Number(r.actual)||0;
        const target = Number(r.target)||0;
        const pct = target>0 ? Math.round(actual/target*100) : 0;
        const w = Math.max(3, Math.round(actual/maxType*100));
        return '<div class="wa-shot-bar-row"><div>'+escapeHtml(r.label || 'ללא סוג')+'</div><div class="wa-shot-track"><div class="wa-shot-fill" style="width:'+w+'%;"></div></div><div class="mono">'+fmt(actual)+'</div></div>'+ 
          '<div style="font-size:13px;color:var(--text-muted);margin-top:-8px;padding-right:224px;">יעד '+(target?fmt(target):'—')+' | '+pct+'%</div>';
      }).join('') + '</div>' : '<div class="table-empty">אין נתוני אריזה לפי סוג</div>';

    shot.innerHTML = ''+
      '<div class="wa-shot-head">'+
        '<div class="wa-shot-logo"><div class="mark">A</div><div><h2>דוח ייצור ואריזה</h2><div class="meta">'+escapeHtml(facilitySummaryText())+' • '+escapeHtml(TAB_LABELS[tab] || '')+' • '+escapeHtml(view.rangeLabel || '')+'</div></div></div>'+ 
        '<div class="meta">הופק: '+new Date().toLocaleString('he-IL')+'</div>'+ 
      '</div>'+ 
      '<div class="wa-shot-grid">'+
        '<div class="wa-shot-card"><div class="label">סה״כ אריזה</div><div class="value">'+fmt(summary.totalPack)+'</div><div class="sub">ליטר בטווח הנבחר</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">יעד אריזה</div><div class="value">'+fmt(summary.targetPack)+'</div><div class="sub">ימי דיווח: '+fmt(targetInfo.workingDays||0)+'</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">עמידה ביעד</div><div class="value" style="color:'+statusColor+'">'+Math.round(summary.pctPack)+'%</div><div class="sub">'+fmt(summary.totalPack)+' / '+fmt(summary.targetPack)+'</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">הזמנות פתוחות</div><div class="value">'+fmt(summary.openOrders)+'</div><div class="sub">סגורות: '+fmt(summary.closedOrders)+'</div></div>'+ 
      '</div>'+ 
      '<div class="wa-shot-grid">'+
        '<div class="wa-shot-card"><div class="label">🟢 מנות תקינות</div><div class="value">'+fmt(summary.goodLots||0)+'</div><div class="sub">'+qGoodPct+'% מסך האיכות</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">🟡 ממתינות לאישור</div><div class="value">'+fmt(summary.conditionalLots||0)+'</div><div class="sub">מותנה / מוגבל</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">🔴 מנות בליקוי</div><div class="value">'+fmt(summary.badLots||0)+'</div><div class="sub">מתוך '+fmt(qTotal)+' מנות</div></div>'+ 
        '<div class="wa-shot-card"><div class="label">📦 מנות איכות בטווח</div><div class="value">'+fmt(qTotal)+'</div><div class="sub">לפי תאריך/פק״ע/Batch</div></div>'+ 
      '</div>'+ 
      '<div class="wa-shot-section"><div class="wa-shot-section-title">אריזה לפי סוג קו</div>'+typeHtml+'</div>'+ 
      '<div class="wa-shot-section"><div class="wa-shot-section-title">מגמת אריזה</div><div class="chart-wrap">'+buildTrendLineSVG(view.buckets || [], 'packaging')+'</div></div>'+ 
      '<div class="wa-shot-footer">תמונה באיכות גבוהה ל‑WhatsApp • מומלץ לשלוח כקובץ תמונה כדי לצמצם דחיסה</div>';
    root.appendChild(shot);
    return shot;
  }

  async function exportDashboardImageToWhatsApp(){
    try{
      if(!loaded){ showToast('הנתונים עדיין נטענים, נסה שוב עוד רגע', true); return; }
      showToast('מכין תמונת דשבורד...');

      const view = getView();
      if(!view || !view.filtered){ showToast('לא ניתן ליצור תמונה כרגע', true); return; }
      const summary = calcAdvancedSummary(view);
      const rows = view.filtered || [];

      /* ── Build canvas summary ── */
      const W = 1080, PAD = 48;
      const canvas = document.createElement('canvas');

      // ─ helper: measure text without ctx yet ─
      const totalPack  = summary.totalPack  || 0;
      const targetPack = summary.targetPack || 0;
      const pctPack    = targetPack > 0 ? Math.round(totalPack / targetPack * 100) : 0;
      const totalProd  = rows.reduce((s,e)=>s+(Number(e.production)||0),0);

      // Build row data
      const qTotal = summary.qRows ? summary.qRows.length : 0;
      const qBad   = summary.badLots || 0;
      const qCond  = summary.conditionalLots || 0;
      const qGood  = summary.goodLots || 0;

      const shiftColors = {'בוקר':'#F59E0B','ערב':'#14B8A6','לילה':'#A78BFA'};
      const packByShift={'בוקר':0,'ערב':0,'לילה':0};
      const prodByShift={'בוקר':0,'ערב':0,'לילה':0};
      rows.forEach(e=>{
        const sh=e.shift&&SHIFTS.includes(e.shift)?e.shift:null;
        if(!sh)return;
        packByShift[sh]+=(Number(e.packaging)||0);
        prodByShift[sh]+=(Number(e.production)||0);
      });
      const hasShift = SHIFTS.some(s=>packByShift[s]>0||prodByShift[s]>0);

      // Calculate height
      let H = 200; // header
      H += 140;    // 3 KPI cards
      H += 20;     // gap
      if(hasShift){ H += 200; H += 20; } // shifts
      if(qTotal > 0){ H += 120; H += 20; } // quality
      H += 60;     // footer
      H += PAD * 2;

      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      /* ── Background ── */
      ctx.fillStyle = '#0A0D12';
      ctx.fillRect(0, 0, W, H);

      /* ── Fonts & helpers ── */
      const rtlText = (text, x, y, maxW)=>{
        ctx.save();
        ctx.scale(-1,1);
        ctx.fillText(text, -x, y, maxW);
        ctx.restore();
      };
      const roundRect = (x,y,w,h,r,fill,stroke)=>{
        ctx.beginPath();
        ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
        ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
        ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
        ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
        if(fill){ctx.fillStyle=fill; ctx.fill();}
        if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke();}
      };

      let cy = PAD;

      /* ── Header ── */
      // Logo circle
      const grad = ctx.createLinearGradient(PAD,cy+4,PAD+50,cy+54);
      grad.addColorStop(0,'#F59E0B'); grad.addColorStop(1,'#B45309');
      roundRect(PAD,cy+4,50,50,10,grad);
      ctx.fillStyle='#1a1300'; ctx.font='bold 24px Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚙', PAD+25, cy+29);

      // Title
      ctx.textAlign='right'; ctx.fillStyle='#F1F5F9';
      ctx.font='bold 32px Arial';
      ctx.fillText('לוח בקרה — ייצור ואריזה', W-PAD, cy+20);
      ctx.font='16px Arial'; ctx.fillStyle='#64748B';
      ctx.fillText(facilitySummaryText()+' · '+escapeHtml(view.rangeLabel||''), W-PAD, cy+50);
      ctx.fillText('הופק: '+new Date().toLocaleString('he-IL'), W-PAD, cy+74);

      // Separator
      cy += 100;
      ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD,cy); ctx.lineTo(W-PAD,cy); ctx.stroke();
      cy += 20;

      /* ── KPI cards row ── */
      const kpiData = [
        {label:'סה״כ אריזה (ליטר)', value:fmt(totalPack), sub: targetPack>0?fmt(targetPack)+' יעד':'', color:'#14B8A6'},
        {label:'עמידה ביעד', value:pctPack+'%', sub: fmt(totalPack)+' / '+fmt(targetPack),
          color: pctPack>=100?'#10B981':pctPack>=75?'#FBBF24':'#EF4444'},
        {label:'סה״כ ייצור', value:fmt(totalProd), sub:'', color:'#F59E0B'},
      ];
      const cardW = (W - PAD*2 - 20) / 3;
      kpiData.forEach((k,i)=>{
        const cx2 = PAD + i*(cardW+10);
        roundRect(cx2,cy,cardW,110,12,'#111827','rgba(255,255,255,0.08)');
        // top accent
        ctx.fillStyle=k.color;
        ctx.fillRect(cx2+cardW-3,cy+10,3,30);
        ctx.textAlign='right'; ctx.fillStyle='#64748B';
        ctx.font='700 11px Arial';
        ctx.fillText(k.label, cx2+cardW-14, cy+22);
        ctx.fillStyle=k.color; ctx.font='bold 34px "JetBrains Mono",Arial';
        ctx.fillText(k.value, cx2+cardW-14, cy+68);
        if(k.sub){ctx.fillStyle='#64748B'; ctx.font='12px Arial'; ctx.fillText(k.sub, cx2+cardW-14, cy+90);}
      });
      cy += 130;

      /* ── Shift breakdown ── */
      if(hasShift){
        ctx.fillStyle='#F1F5F9'; ctx.font='bold 18px Arial'; ctx.textAlign='right';
        ctx.fillText('פירוט לפי משמרת', W-PAD, cy);
        cy += 30;
        const shW = (W - PAD*2 - 20) / 3;
        SHIFTS.forEach((sh,i)=>{
          const cx2 = PAD + i*(shW+10);
          const v = packByShift[sh]||0;
          const pct = totalPack>0 ? Math.round(v/totalPack*100) : 0;
          roundRect(cx2,cy,shW,110,12,'#111827','rgba(255,255,255,0.08)');
          ctx.fillStyle=shiftColors[sh]; ctx.font='bold 12px Arial'; ctx.textAlign='right';
          ctx.fillText('■ משמרת '+sh, cx2+shW-14, cy+22);
          ctx.fillStyle='#F1F5F9'; ctx.font='bold 28px "JetBrains Mono",Arial';
          ctx.fillText(fmt(v), cx2+shW-14, cy+62);
          // bar
          roundRect(cx2+14,cy+78,shW-28,8,4,'rgba(255,255,255,0.05)');
          if(pct>0)roundRect(cx2+shW-14-Math.round((shW-28)*pct/100),cy+78,Math.round((shW-28)*pct/100),8,4,shiftColors[sh]);
          ctx.fillStyle='#64748B'; ctx.font='11px Arial';
          ctx.fillText(pct+'%', cx2+shW-14, cy+100);
        });
        cy += 130;
      }

      /* ── Quality ── */
      if(qTotal > 0){
        ctx.fillStyle='#F1F5F9'; ctx.font='bold 18px Arial'; ctx.textAlign='right';
        ctx.fillText('סיכום איכות', W-PAD, cy);
        cy += 30;
        const qItems = [
          {label:'מנות תקינות',    value:qGood, color:'#10B981'},
          {label:'ממתינות להחלטה', value:qCond, color:'#FBBF24'},
          {label:'נפסלו',          value:qBad,  color:'#EF4444'},
        ];
        const qW = (W - PAD*2 - 20) / 3;
        qItems.forEach((q,i)=>{
          const cx2 = PAD + i*(qW+10);
          roundRect(cx2,cy,qW,70,12,'#111827','rgba(255,255,255,0.08)');
          ctx.fillStyle=q.color; ctx.font='bold 11px Arial'; ctx.textAlign='right';
          ctx.fillText(q.label, cx2+qW-14, cy+22);
          ctx.fillStyle=q.color; ctx.font='bold 30px Arial';
          ctx.fillText(q.value, cx2+qW-14, cy+56);
        });
        cy += 90;
      }

      /* ── Footer ── */
      cy += 10;
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD,cy); ctx.lineTo(W-PAD,cy); ctx.stroke();
      cy += 20;
      ctx.fillStyle='#64748B'; ctx.font='13px Arial'; ctx.textAlign='center';
      ctx.fillText('לוח בקרה ייצור ואריזה · '+new Date().toLocaleString('he-IL'), W/2, cy+12);

      /* ── Share overlay ── */
      canvas.toBlob(async (blob)=>{
        if(!blob){ showToast('לא ניתן ליצור תמונה', true); return; }

        const fileName = 'dashboard_'+todayISO()+'.png';
        const objectUrl = URL.createObjectURL(blob);
        const file = new File([blob], fileName, {type:'image/png'});

        // Build share overlay
        const old = root.querySelector('#dashboardShareOverlay');
        if(old) old.remove();

        const overlay = document.createElement('div');
        overlay.id = 'dashboardShareOverlay';
        overlay.className = 'modal-overlay open';
        overlay.innerHTML =
          '<div class="modal" style="max-width:520px;">'+
            '<h3>📸 תמונת דשבורד מוכנה</h3>'+
            '<div style="margin-bottom:16px;">'+
              '<img src="'+objectUrl+'" style="width:100%;border-radius:10px;border:1px solid var(--border);"/>' +
            '</div>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">'+
              '<button class="btn primary" id="dsh-share-native" style="font-size:13px;">📤 שתף / שלח</button>'+
              '<button class="btn secondary" id="dsh-share-wa" style="font-size:13px;border-color:#25D366;color:#25D366;">💬 WhatsApp</button>'+
              '<button class="btn secondary" id="dsh-share-email" style="font-size:13px;">📧 אימייל</button>'+
              '<a id="dsh-download" class="btn secondary" href="'+objectUrl+'" download="'+fileName+'" style="text-align:center;font-size:13px;text-decoration:none;">📥 הורד</a>'+
            '</div>'+
            '<button class="btn secondary" id="dsh-close" style="width:100%;font-size:13px;">סגור</button>'+
          '</div>';

        root.appendChild(overlay);

        // Native share (works great on iPhone)
        overlay.querySelector('#dsh-share-native').onclick = async ()=>{
          try{
            if(navigator.canShare && navigator.canShare({files:[file]})){
              await navigator.share({files:[file], title:'דוח ייצור ואריזה', text:'דוח ייצור ואריזה'});
            } else {
              // fallback: try sharing just text+url, or just download
              overlay.querySelector('#dsh-download').click();
              showToast('שיתוף קובץ לא נתמך — הקובץ הורד');
            }
          }catch(e){ if(e.name!=='AbortError') showToast('לא ניתן לשתף', true); }
        };

        overlay.querySelector('#dsh-share-wa').onclick = ()=>{
          overlay.querySelector('#dsh-download').click();
          setTimeout(()=>{ window.open('https://wa.me/', '_blank'); }, 600);
          showToast('הקובץ הורד — גרור אותו לצ׳אט ב-WhatsApp');
        };

        overlay.querySelector('#dsh-share-email').onclick = ()=>{
          overlay.querySelector('#dsh-download').click();
          const subject = encodeURIComponent('דוח ייצור ואריזה '+view.rangeLabel);
          const body    = encodeURIComponent('מצורף דוח ייצור ואריזה. הקובץ הורד אוטומטית.');
          window.open('mailto:?subject='+subject+'&body='+body, '_self');
        };

        const close = ()=>{ overlay.remove(); setTimeout(()=>URL.revokeObjectURL(objectUrl), 5000); };
        overlay.querySelector('#dsh-close').onclick = close;
        overlay.onclick = e=>{ if(e.target===overlay) close(); };

      }, 'image/png', 1.0);

    }catch(err){
      console.error('Dashboard screenshot error:', err);
      showToast('שגיאה ביצירת תמונת דשבורד: '+err.message, true);
    }
  }


  function buildWhatsAppMessage(){
    const view = (typeof getView === 'function') ? getView() : {filtered: [], rangeLabel: ''};
    const rows = Array.isArray(view.filtered) ? view.filtered : [];
    const summary = (typeof calcAdvancedSummary === 'function') ? calcAdvancedSummary(view) : null;
    const mode = (typeof facilityViewMode === 'function') ? facilityViewMode() : 'both';
    const totalProd = rows.reduce((s,e)=>s+(Number(e.production)||0),0);
    const totalPack = summary ? summary.totalPack : rows.reduce((s,e)=>s+(Number(e.packaging)||0),0);
    const targetProd = rows.reduce((s,e)=>s+((typeof getProductionTarget === 'function') ? getProductionTarget(e) : 0),0);
    const targetPack = summary ? summary.targetPack : rows.reduce((s,e)=>s+((typeof getPackagingTarget === 'function') ? getPackagingTarget(e) : 0),0);
    const pctProd = targetProd>0 ? Math.round(totalProd/targetProd*100) : 0;
    const pctPack = targetPack>0 ? Math.round(totalPack/targetPack*100) : 0;
    const facText = (typeof facilitySummaryText === 'function') ? facilitySummaryText() : 'כל המתקנים';
    const tabText = (typeof TAB_LABELS !== 'undefined' && TAB_LABELS[tab]) ? TAB_LABELS[tab] : (tab || '');
    const rangeText = view.rangeLabel || '';
    const targetInfo = (summary && summary.targetInfo) ? summary.targetInfo : ((typeof getLineTargetInfo === 'function') ? getLineTargetInfo(view) : null);
    const typeRows = summary && Array.isArray(summary.typeRows) ? summary.typeRows : [];
    const dailyRows = targetInfo && Array.isArray(targetInfo.dailyRows) ? targetInfo.dailyRows : [];
    const workingDays = targetInfo ? (targetInfo.workingDays || 0) : new Set(rows.map(e=>e.date).filter(Boolean)).size;

    const statusEmoji = pct => pct >= 100 ? '🟢' : (pct >= 85 ? '🟡' : '🔴');
    const pctText = pct => (isFinite(pct) ? Math.round(pct) : 0) + '%';
    const line = (label, value, emoji) => (emoji ? emoji + ' ' : '▪️ ') + label + ': ' + value;
    const divider = '━━━━━━━━━━━━━━━━━━━━';

    const lines = [];
    lines.push('📊 *דוח ייצור ואריזה*');
    lines.push(divider);
    if(tabText) lines.push('🗂️ *תצוגה:* ' + tabText);
    if(rangeText) lines.push('📅 *טווח:* ' + rangeText);
    lines.push('🏭 *' + facText + '*');
    lines.push('🧾 *רשומות בדוח:* ' + fmt(rows.length));
    if(workingDays) lines.push('📆 *ימי דיווח בפועל:* ' + fmt(workingDays));

    lines.push('');
    lines.push('🎯 *ביצועים מרכזיים*');
    lines.push(divider);
    if(mode !== 'packaging'){
      lines.push(line('סה״כ ייצור', fmt(totalProd) + ' יח׳', '🏗️'));
      if(targetProd > 0){
        lines.push(line('יעד ייצור', fmt(targetProd) + ' יח׳', '🎯'));
      }
    }
    if(mode !== 'production'){
      lines.push(line('סה״כ אריזה', fmt(totalPack) + ' ליטר', '📦'));
      if(targetPack > 0){
        lines.push(line('יעד אריזה מחושב', fmt(targetPack) + ' ליטר', '🎯'));
        lines.push(line('עמידה ביעד אריזה', pctText(pctPack), statusEmoji(pctPack)));
      }
    }

    if(typeRows.length){
      lines.push('');
      lines.push('🧃 *ניצולת לפי קווי אריזה*');
      lines.push(divider);
      typeRows.filter(r=>Number(r.actual||0)>0 || Number(r.target||0)>0).slice(0,6).forEach(r=>{
        const u = Number(r.utilization||0);
        const daysTxt = r.days ? ' | ימים: ' + fmt(r.days) : '';
        lines.push(statusEmoji(u) + ' ' + r.label + ' — ' + fmt(r.actual||0) + ' / ' + fmt(r.target||0) + ' ל׳ (' + pctText(u) + ')' + daysTxt);
      });
    }

    const closedOrders = summary ? summary.closedOrders : rows.filter(isOrderClosed).length;
    const openOrders = summary ? summary.openOrders : rows.filter(e=>e.systemStatus && !isOrderClosed(e)).length;
    const totalOrders = closedOrders + openOrders;
    if(totalOrders > 0){
      const closedPct = totalOrders>0 ? Math.round(closedOrders/totalOrders*100) : 0;
      lines.push('');
      lines.push('📋 *סטטוס הזמנות*');
      lines.push(divider);
      lines.push(line('הזמנות סגורות', fmt(closedOrders), '✅'));
      lines.push(line('הזמנות פתוחות', fmt(openOrders), openOrders>0 ? '🟡' : '🟢'));
      lines.push(line('שיעור סגירה', closedPct + '%', statusEmoji(closedPct)));
    }

    if(typeof qualitySummary !== 'undefined' && qualitySummary){
      let qMatched = summary && Array.isArray(summary.qRows) ? summary.qRows : [];
      if(!qMatched.length && typeof qualityMatchesPackaging === 'function'){
        const qRows = Object.values(qualitySummary || {});
        qMatched = qRows.filter(q => rows.some(e => qualityMatchesPackaging(q, e)));
      }
      if(qMatched.length > 0){
        const qGood = qMatched.filter(q=>q.worst==='ok').length;
        const qBad = qMatched.filter(q=>q.worst==='bad').length;
        const qConditional = qMatched.filter(q=>q.worst==='conditional').length;
        const qGoodPct = qMatched.length ? Math.round(qGood/qMatched.length*100) : 0;
        lines.push('');
        lines.push('🔬 *איכות*');
        lines.push(divider);
        lines.push(line('מנות איכות בטווח', fmt(qMatched.length), '📌'));
        lines.push(line('מנות תקינות', fmt(qGood) + ' (' + qGoodPct + '%)', '🟢'));
        lines.push(line('מותנה / מוגבל', fmt(qConditional), qConditional>0 ? '🟡' : '⚪'));
        lines.push(line('מנות בליקוי', fmt(qBad), qBad>0 ? '🔴' : '🟢'));
      }
    }

    const eventRows = (typeof filteredEventsForView === 'function') ? filteredEventsForView(view) : [];
    if(eventRows.length){
      const qualityEvents = eventRows.filter(e=>e.type==='quality').length;
      const envEvents = eventRows.filter(e=>e.type==='environment').length;
      lines.push('');
      lines.push('⚠️ *אירועי איכות וסביבה*');
      lines.push(divider);
      lines.push(line('סה״כ אירועים', fmt(eventRows.length), eventRows.length ? '🟡' : '🟢'));
      lines.push(line('אירועי איכות', fmt(qualityEvents), qualityEvents ? '🔴' : '🟢'));
      lines.push(line('אירועי סביבה', fmt(envEvents), envEvents ? '🌿' : '🟢'));
      eventRows.slice(0,3).forEach(ev=>{
        const ref = [ev.date, ev.facility ? 'מתקן ' + ev.facility : '', ev.title || ev.description || 'אירוע'].filter(Boolean).join(' | ');
        lines.push('• ' + ref);
      });
      if(eventRows.length > 3) lines.push('• ועוד ' + fmt(eventRows.length-3) + ' אירועים בדוח המלא');
    }

    const byFacility = {};
    rows.forEach(e=>{
      const f = e.facility || 'לא מוגדר';
      if(!byFacility[f]) byFacility[f] = {production:0, packaging:0, targetPackaging:0};
      byFacility[f].production += Number(e.production)||0;
      byFacility[f].packaging += Number(e.packaging)||0;
      byFacility[f].targetPackaging += (typeof getPackagingTarget === 'function') ? getPackagingTarget(e) : 0;
    });
    const facilities = Object.keys(byFacility).sort();
    if(facilities.length > 1){
      lines.push('');
      lines.push('🏭 *פירוט לפי מתקן*');
      lines.push(divider);
      facilities.slice(0, 8).forEach(f=>{
        const r = byFacility[f];
        lines.push('• מתקן ' + f + ' — אריזה ' + fmt(r.packaging) + ' ל׳ | ייצור ' + fmt(r.production));
      });
    }

    if(dailyRows.length){
      const lastDays = dailyRows.slice(-5);
      lines.push('');
      lines.push('📈 *ניצולת יומית — 5 ימים אחרונים בדוח*');
      lines.push(divider);
      lastDays.forEach(d=>{
        const u = Number(d.utilization||0);
        lines.push(statusEmoji(u) + ' ' + d.date + ' — ' + fmt(d.actual||0) + ' / ' + fmt(d.target||0) + ' ל׳ (' + pctText(u) + ')');
      });
    }

    const notedRows = rows.filter(e => typeof getEntryNotes === 'function' && getEntryNotes(e)).slice(0, 5);
    if(notedRows.length > 0){
      lines.push('');
      lines.push('📝 *הערות מרכזיות*');
      lines.push(divider);
      notedRows.forEach(e=>{
        const ref = [e.date, e.facility ? 'מתקן '+e.facility : '', e.workOrder ? 'פק״ע '+e.workOrder : '', e.line || ''].filter(Boolean).join(' | ');
        lines.push('• ' + ref + ': ' + getEntryNotes(e));
      });
      const totalNotes = rows.filter(e => getEntryNotes(e)).length;
      if(totalNotes > notedRows.length) lines.push('• ועוד ' + fmt(totalNotes - notedRows.length) + ' הערות בדוח המלא');
    }

    lines.push('');
    lines.push(divider);
    lines.push('🕒 הופק מתוך לוח הבקרה • ' + new Date().toLocaleString('he-IL'));
    return lines.join('\n');
  }

  function openWhatsAppWithMessage(msg){
    const text = msg || '';
    const encoded = encodeURIComponent(text);
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');

    // בטלפון — פתיחה ישירה של אפליקציית WhatsApp.
    // אם האפליקציה לא נפתחת, אחרי רגע עוברים לקישור wa.me.
    if(isMobile){
      const appUrl = 'whatsapp://send?text=' + encoded;
      const webFallback = 'https://wa.me/?text=' + encoded;
      let moved = false;
      const markMoved = () => { moved = true; };
      window.addEventListener('pagehide', markMoved, {once:true});
      window.addEventListener('blur', markMoved, {once:true});
      window.location.href = appUrl;
      setTimeout(function(){
        if(!moved) window.location.href = webFallback;
      }, 900);
      return;
    }

    // במחשב — פתיחת WhatsApp Web עם ההודעה.
    const url = 'https://web.whatsapp.com/send?text=' + encoded;
    const opened = window.open(url, '_blank', 'noopener,noreferrer');
    if(!opened){
      window.location.href = url;
    }
  }

function exportToWhatsApp(){
    try {
      const msg = buildWhatsAppMessage();
      if(!msg.trim()){
        showToast('אין נתונים לייצוא', true);
        return;
      }

      const overlay = root.querySelector('#whatsappOverlay');
      const preview = root.querySelector('#whatsappPreview');
      const openBtn = root.querySelector('#whatsappOpenBtn');
      const copyBtn = root.querySelector('#whatsappCopyBtn');
      const closeBtn = root.querySelector('#whatsappCloseBtn');

      if(!overlay || !preview || !openBtn){
        openWhatsAppWithMessage(msg);
        return;
      }

      preview.textContent = msg;
      overlay.classList.add('open');

      openBtn.onclick = function(){ openWhatsAppWithMessage(msg); };
      if(copyBtn){
        copyBtn.onclick = async function(){
          try{
            await navigator.clipboard.writeText(msg);
            showToast('ההודעה הועתקה');
          }catch(e){
            showToast('לא ניתן להעתיק אוטומטית — סמן והעתק ידנית', true);
          }
        };
      }
      if(closeBtn) closeBtn.onclick = function(){ overlay.classList.remove('open'); };
      overlay.onclick = function(e){ if(e.target === overlay) overlay.classList.remove('open'); };
    } catch(err) {
      console.error('WhatsApp export error:', err);
      showToast('שגיאה ביצירת הודעת WhatsApp', true);
    }
  }

  function renderShiftComparison(view){
    const container = root.querySelector('#shiftComparisonPanel');
    if(!container) return;
    const rows = (view && view.filtered) || [];
    const hasShiftData = rows.some(e=>e.shift && SHIFTS.includes(e.shift));
    if(!hasShiftData){ container.innerHTML=''; return; }

    const shiftColors = {'בוקר':'var(--amber)','ערב':'var(--teal)','לילה':'#9B7FE8'};
    const packByShift={'בוקר':0,'ערב':0,'לילה':0};
    const prodByShift={'בוקר':0,'ערב':0,'לילה':0};
    const cntByShift={'בוקר':0,'ערב':0,'לילה':0};
    rows.forEach(e=>{
      const sh=e.shift&&SHIFTS.includes(e.shift)?e.shift:null;
      if(!sh)return;
      packByShift[sh]+=(Number(e.packaging)||0);
      prodByShift[sh]+=(Number(e.production)||0);
      cntByShift[sh]++;
    });
    const totalPack=SHIFTS.reduce((s,sh)=>s+packByShift[sh],0);
    const totalProd=SHIFTS.reduce((s,sh)=>s+prodByShift[sh],0);
    const hasPackData=totalPack>0;
    const hasProdData=totalProd>0;
    if(!hasPackData&&!hasProdData){container.innerHTML='';return;}

    function shiftTable(byShift, total, unit){
      let html='<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:6px;">';
      SHIFTS.forEach(sh=>{
        const v=byShift[sh]||0;
        const pct=total>0?Math.round(v/total*100):0;
        const w=pct;
        html+=
          '<div>'+
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'+
              '<span style="font-size:13px;font-weight:800;color:'+shiftColors[sh]+'">■ משמרת '+escapeHtml(sh)+'</span>'+
              '<span style="font-family:\'JetBrains Mono\',monospace;font-size:14px;font-weight:700;">'+fmt(v)+' '+unit+'</span>'+
              '<span style="font-size:18px;font-weight:900;color:'+shiftColors[sh]+';min-width:52px;text-align:left;">'+pct+'%</span>'+
            '</div>'+
            '<div style="height:14px;background:var(--panel-2);border-radius:999px;overflow:hidden;border:1px solid var(--border);">'+
              '<div style="height:100%;width:'+w+'%;background:'+shiftColors[sh]+';border-radius:999px;transition:width .4s;"></div>'+
            '</div>'+
            '<div class="kpi-sub" style="margin-top:3px;">'+cntByShift[sh]+' רשומות</div>'+
          '</div>';
      });
      // total row
      html+=
        '<div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center;">'+
          '<span style="font-size:12px;font-weight:700;color:var(--text-muted);">סה״כ</span>'+
          '<span style="font-family:\'JetBrains Mono\',monospace;font-size:15px;font-weight:800;">'+fmt(total)+' '+unit+'</span>'+
          '<span style="font-size:18px;font-weight:900;color:var(--text-muted);">100%</span>'+
        '</div>';
      html+='</div>';
      return html;
    }

    let html='<div class="panel" style="margin-bottom:16px;">'+
      '<div class="panel-head"><div>'+
        '<div class="panel-title">השוואת משמרות</div>'+
        '<div class="kpi-sub">חלוקת הכמות לפי משמרות · '+escapeHtml(view.rangeLabel||'')+'</div>'+
      '</div></div>';

    if(hasPackData&&hasProdData){
      // Two columns side by side
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">'+
        '<div><div class="panel-title" style="font-size:12px;margin-bottom:10px;">📦 אריזה (ליטר)</div>'+shiftTable(packByShift,totalPack,'ל׳')+'</div>'+
        '<div><div class="panel-title" style="font-size:12px;margin-bottom:10px;">🏗️ ייצור (יח׳)</div>'+shiftTable(prodByShift,totalProd,'יח׳')+'</div>'+
      '</div>';
    } else if(hasPackData){
      html+=shiftTable(packByShift,totalPack,'ל׳');
    } else {
      html+=shiftTable(prodByShift,totalProd,'יח׳');
    }

    html+='</div>';
    container.innerHTML=html;
  }

function renderAll(){

  // חישוב משמרת לפי שעה: בוקר 07:00-14:59, ערב 15:00-22:59, לילה 23:00-06:59
  function shiftFromHour(hour){
    if(hour >= 7 && hour < 15) return 'בוקר';
    if(hour >= 15 && hour < 23) return 'ערב';
    return 'לילה'; // 23:00-00:00 ו-00:00-07:00
  }

  // פענוח Actual Finish Time — מגיע כ-timestamp Excel (מספר עם חלק שבר לשעה)
  // או כמחרוזת "DD.MM.YYYY HH:MM:SS" / "YYYY-MM-DD HH:MM:SS"
  function parseFinishTimeToHour(raw){
    if(raw === undefined || raw === null || raw === '') return null;
    // Excel datetime serial: חלק שבר = חלק היום (0 = חצות, 0.5 = צהריים)
    if(typeof raw === 'number'){
      const frac = raw - Math.floor(raw);
      const totalMinutes = Math.round(frac * 24 * 60);
      return Math.floor(totalMinutes / 60) % 24;
    }
    const s = (''+raw).trim();
    // "DD.MM.YYYY HH:MM:SS" or "YYYY-MM-DD HH:MM:SS" or "HH:MM:SS"
    const m = s.match(/(\d{1,2})[:.]\d{2}[:.]\d{2}\s*(?:AM|PM)?$/i) ||
              s.match(/\s(\d{1,2}):\d{2}/);
    if(m){
      let h = parseInt(m[1], 10);
      if(/PM/i.test(s) && h < 12) h += 12;
      if(/AM/i.test(s) && h === 12) h = 0;
      return h % 24;
    }
    const t = Date.parse(s);
    if(!isNaN(t)){
      return new Date(t).getHours();
    }
    return null;
  }
  function detectPackagingTypeFromText(text){
    if(!text) return '';
    const t = (''+text).toLowerCase();
    if(/\b(10|20)\s*(ליטר|lt\b|l\b|liter)/i.test(t)) return 'קו אריזה 10/20 ליטר';
    const sizes = [5,1];
    for(const sz of sizes){
      const re = new RegExp('\\b'+sz+'\\s*(ליטר|lt\\b|l\\b|liter)', 'i');
      if(re.test(t)) return 'קו אריזה '+sz+' ליטר';
    }
    return '';
  }
  function normalizeDateStr(s){
    s = s.trim();
    if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){
      const [y,m,d] = s.split('-'); return y+'-'+pad2(+m)+'-'+pad2(+d);
    }
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
      const [d,m,y] = s.split('/'); return y+'-'+pad2(+m)+'-'+pad2(+d);
    }
    const t = Date.parse(s);
    if(!isNaN(t)) return toISO(new Date(t));
    return null;
  }
  function splitCSVLine(line, delim){
    delim = delim || ',';
    const result = [];
    let cur = '', inQuotes = false;
    for(let i=0;i<line.length;i++){
      const c = line[i];
      if(inQuotes){
        if(c === '"'){
          if(line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
        } else cur += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === delim){ result.push(cur); cur=''; }
        else cur += c;
      }
    }
    result.push(cur);
    return result.map(s=>s.trim());
  }
  function detectDelimiter(headerLine){
    const counts = {
      ',': (headerLine.match(/,/g)||[]).length,
      ';': (headerLine.match(/;/g)||[]).length,
      '\t': (headerLine.match(/\t/g)||[]).length
    };
    let best = ',', bestCount = counts[','];
    if(counts['\t'] > bestCount){ best = '\t'; bestCount = counts['\t']; }
    if(counts[';'] > bestCount){ best = ';'; bestCount = counts[';']; }
    return best;
  }
  function processRows(headerRow, dataRows){
    const map = {};
    headerRow.forEach((h,i)=>{ const k = HEADER_MAP[(''+h).trim()] || HEADER_MAP[(''+h).trim().toLowerCase()]; if(k && map[k]===undefined) map[k]=i; });
    if(map.date===undefined) return null;
    const getStr = (cols, idx, def) => { if(idx===undefined) return def||''; const v = cols[idx]; if(v===undefined||v===null) return def||''; const s=(''+v).trim(); return s || (def||''); };
    const getNum = (cols, idx) => { if(idx===undefined) return 0; const v = cols[idx]; if(v===undefined||v===null||v==='') return 0; const n = parseFloat((''+v).replace(',', '.')); return isNaN(n)?0:n; };
    const rows = [];
    dataRows.forEach(cols=>{
      if(!cols || cols.length===0) return;
      const rawDate = cols[map.date];
      let date = null;
      if(rawDate instanceof Date) date = dateObjToISO(rawDate);
      else if(typeof rawDate === 'number') date = excelSerialToISO(rawDate);
      else if(rawDate!==undefined && rawDate!==null && rawDate!=='') date = normalizeDateStr(''+rawDate);
      if(!date) return;
      const facilityVal = getStr(cols, map.facility, '');
      const isPackagingOnlyFac = PACKAGING_ONLY_FACILITIES.includes(facilityVal);
      const deliveredQty = map.delivered_qty!==undefined ? getNum(cols, map.delivered_qty) : null;
      let productionVal = getNum(cols, map.production);
      let packagingVal = getNum(cols, map.packaging);
      if(deliveredQty !== null){
        if(isPackagingOnlyFac && map.packaging===undefined) packagingVal = deliveredQty;
        else if(!isPackagingOnlyFac && map.production===undefined) productionVal = deliveredQty;
      }
      let packagingTypeVal = getStr(cols, map.packaging_type, '');
      if(!packagingTypeVal && map.material_name!==undefined){
        packagingTypeVal = detectPackagingTypeFromText(getStr(cols, map.material_name, ''));
      }
      if(!packagingTypeVal && map.packaging_type_text!==undefined){
        packagingTypeVal = detectPackagingTypeFromText(getStr(cols, map.packaging_type_text, ''));
      }
      rows.push({
        id: genId(),
        date,
        facility: facilityVal,
        plant: getStr(cols, map.plant, '') || getPlant(facilityVal),
        line: getStr(cols, map.line, 'כללי'),
        actualFinishTime: map.finish_time !== undefined ? getStr(cols, map.finish_time, '') : '',
        shift: (()=>{
          // עדיפות: Actual Finish Time (שעת יצירת המשטח) → משמרת מפורשת → Time Stamp כגיבוי בלבד
          // חשוב: Time Stamp בקובץ SAP עשוי להיות מועד עדכון/שליפת הרשומה ולא מועד יצירת המשטח.
          if(map.finish_time !== undefined){
            const rawFt = cols[map.finish_time];
            const h = parseFinishTimeToHour(rawFt);
            if(h !== null) return shiftFromHour(h);
          }
          const explicitShift = getStr(cols, map.shift, '');
          if(explicitShift && SHIFTS.includes(explicitShift)) return explicitShift;
          // גיבוי בלבד כאשר Actual Finish Time חסר או לא ניתן לפענוח
          if(map.time_stamp !== undefined){
            const rawTs = cols[map.time_stamp];
            const h = parseFinishTimeToHour(rawTs);
            if(h !== null) return shiftFromHour(h);
          }
          return explicitShift;
        })(),
        packagingType: packagingTypeVal,
        materialName: getStr(cols, map.material_name, ''),
        materialCode: getStr(cols, map.material_code, '').replace(/\.0$/, '').trim(),
        workOrder: getStr(cols, map.work_order, ''),
        orderType: getStr(cols, map.order_type, ''),
        production: productionVal,
        packaging: packagingVal,
        orderQuantity: getNum(cols, map.order_quantity),
        confirmedYield: getNum(cols, map.confirmed_yield),
        systemStatus: getStr(cols, map.system_status, ''),
        batch: getStr(cols, map.batch, ''),
        targetProduction: getNum(cols, map.target_production),
        targetPackaging: getNum(cols, map.target_packaging),
        notes: getStr(cols, map.notes, ''),
        createdAt: Date.now()
      });
    });
    return rows;
  }
  async function handleDataFile(file){
    try {
      const name = file.name.toLowerCase();
      let headerRow, dataRows;
      if(name.endsWith('.xlsx') || name.endsWith('.xls')){
        if(typeof XLSX === 'undefined'){ showToast('ספריית Excel לא נטענה — ודאו שיש חיבור אינטרנט ורעננו את הדף (Ctrl+R / Cmd+R).', true); return; }
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:'array', cellDates:false});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const grid = XLSX.utils.sheet_to_json(sheet, {header:1, defval:'', raw:true});
        if(grid.length<2){ showToast('הקובץ לא מכיל שורות נתונים', true); return; }
        headerRow = grid[0];
        dataRows = grid.slice(1);
      } else {
        const text = await file.text();
        const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
        if(lines.length<2){ showToast('הקובץ לא מכיל שורות נתונים', true); return; }
        const cleanFirst = lines[0].replace(/^\uFEFF/,'');
        const delim = detectDelimiter(cleanFirst);
        headerRow = splitCSVLine(cleanFirst, delim);
        dataRows = lines.slice(1).map(l=>splitCSVLine(l, delim));
      }
      const rows = processRows(headerRow, dataRows);
      if(rows===null){ showToast('לא נמצאה עמודת תאריך בקובץ. בדקו את הכותרות.', true); return; }
      if(rows.length===0){ showToast('לא נמצאו שורות תקינות בקובץ', true); return; }
      // ייבוא SAP הוא Upsert: רשומה קיימת מוחלפת בגרסה העדכנית מהקובץ.
      // כך טעינה חוזרת מעדכנת Actual Finish Time/משמרת במקום להשאיר נתונים ישנים.
      // אין לזהות כפילות רק לפי תאריך+מתקן+כמות, מכיוון ששני משטחים שונים יכולים להיות באותה כמות.
      const sapIdentity = r => {
        const wo = String(r.workOrder || '').trim();
        const batch = String(r.batch || '').trim();
        const fac = String(r.facility || '').trim();
        if(wo) return 'WO|'+wo+'|'+fac;
        if(batch) return 'BATCH|'+batch+'|'+fac+'|'+String(r.date||'');
        return 'ROW|'+[r.date,fac,r.materialCode,r.packaging,r.production,r.shift].join('|');
      };

      const importedKeys = new Set(rows.map(sapIdentity));
      const beforeCount = entries.length;
      // הסר רק רשומות שמתאימות לרשומות שבקובץ החדש, ואז הכנס את הגרסה המעודכנת.
      // רשומות ידניות/היסטוריות שאינן נמצאות בקובץ נשמרות.
      entries = entries.filter(e => !importedKeys.has(sapIdentity(e)));
      const replaced = beforeCount - entries.length;
      entries = entries.concat(rows);
      const ok = await persist();
      if(ok){
        showToast(rows.length+' רשומות יובאו ועודכנו'+(replaced>0?' ('+replaced+' רשומות ישנות הוחלפו)':''));
        renderAll();
      }
    } catch(e){
      showToast('שגיאה בקריאת הקובץ', true);
    }
  }

    if(isAdmin){ adminToken=''; isAdmin=false; sessionStorage.removeItem('dashboard_admin_token'); applyRoleUI(); showToast('יצאת ממצב מנהל'); return; }
    root.querySelector('#adminLoginOverlay').classList.add('open');
    setTimeout(()=>root.querySelector('#adminCodeInput').focus(),50);
  };
  root.querySelector('#adminCancelBtn').onclick = ()=>root.querySelector('#adminLoginOverlay').classList.remove('open');
  root.querySelector('#adminLoginOverlay').onclick = e=>{ if(e.target.id==='adminLoginOverlay') e.currentTarget.classList.remove('open'); };
  function entryMergeKey(e){
    if(e && e.id != null && String(e.id)!=='') return 'id:'+String(e.id);
    const fields=['date','facility','workOrder','order','batch','material','materialCode','materialName','quantity','qty','productionQty','packagingQty','actualFinishTime','packagingType','shift','orderType'];
    return 'row:'+fields.map(k=>String((e&&e[k])??'')).join('|');
  }

  function readLocalEntriesForMigration(){
    let result=[];
    try{
      const idxRaw=localStorage.getItem(ENTRIES_INDEX_KEY);
      const months=idxRaw?JSON.parse(idxRaw):[];
      if(Array.isArray(months) && months.length){
        months.forEach(m=>{ const raw=localStorage.getItem(ENTRIES_KEY_PREFIX+m); if(raw) try{ result=result.concat(JSON.parse(raw)); }catch(e){} });
      }else{
        const legacy=localStorage.getItem(STORAGE_KEY); if(legacy) try{ result=JSON.parse(legacy); }catch(e){}
      }
    }catch(e){}
    return Array.isArray(result)?result:[];
  }

  async function migrateCurrentDataToSharedStorage(){
    if(IS_LOCAL_FILE || !isAdmin) return;
    try{
      const localEntries=readLocalEntriesForMigration();
      if(!localEntries.length){
        showToast('במחשב זה אין נתונים מקומיים להעברה. הנתונים אמורים להיטען אוטומטית מהענן.');
        return;
      }
      const merged=new Map();
      entries.forEach(e=>merged.set(entryMergeKey(e),e));
      localEntries.forEach(e=>merged.set(entryMergeKey(e),e));
      const before=entries.length;
      entries=Array.from(merged.values());

      let localQualityRaw=null;
      try{ localQualityRaw=localStorage.getItem(QUALITY_STORAGE_KEY); }catch(e){}
      if(localQualityRaw){
        try{
          const localQ=JSON.parse(localQualityRaw);
          const cloudQ={};
          qualityEntries.forEach(q=>{ if(q&&q.batch) cloudQ[String(q.batch).trim()]=q.udCode||''; });
          Object.entries(localQ||{}).forEach(([batch,v])=>{ cloudQ[batch]=(v&&typeof v==='object')?(v.udCode||''):v; });
          qualityEntries=Object.entries(cloudQ).map(([batch,udCode])=>({batch,udCode,udDate:0,materialCode:'',materialName:'',qaApproval:'',facility:''}));
        }catch(e){}
      }

      showToast('מאחד נתונים מקומיים עם האחסון המשותף...');
      await persist();
      await persistTargets();
      await persistProductionTargets();
      await persistPeriodPackagingTargets();
      await persistEventsEntries();
      if(qualityEntries && qualityEntries.length) await persistQuality();
      renderAll();
      showToast('האיחוד הושלם: '+entries.length+' רשומות זמינות כעת לכל המשתמשים'+(entries.length>before?' (נוספו '+(entries.length-before)+')':'')+'.');
    }catch(e){
      console.error('Shared storage migration failed:', e);
      showToast('הכניסה הצליחה, אך איחוד הנתונים לענן נכשל: '+(e.message||e), true);
    }
  }


  async function submitAdminLogin(){
    const code=(root.querySelector('#adminCodeInput').value||'').trim();
    if(!code){ showToast('יש להזין קוד מנהל', true); return; }
    try{
      const res=await fetch(STORAGE_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'auth',key:'admin',code})});
      const data=await res.json();
      if(!res.ok || !data.token) throw new Error(data.error||'login failed');
      adminToken=data.token; isAdmin=true; sessionStorage.setItem('dashboard_admin_token',adminToken);
      root.querySelector('#adminCodeInput').value=''; root.querySelector('#adminLoginOverlay').classList.remove('open'); applyRoleUI(); showToast('מצב מנהל הופעל. הנתונים נטענים מהענן ואינם מועתקים מהמחשב הזה.');
    }catch(e){
      const msg=String(e && e.message || '');
      if(msg.includes('ADMIN_CODE_NOT_CONFIGURED')) showToast('משתנה ADMIN_CODE אינו מוגדר בפונקציית Netlify', true);
      else if(msg.includes('INVALID_ADMIN_CODE')) showToast('קוד המנהל אינו תואם לערך ADMIN_CODE', true);
      else showToast('שגיאת התחברות לשרת: '+(msg||'לא ידועה'), true);
      console.error('Admin login failed:', e);
    }
  }
  root.querySelector('#adminSubmitBtn').onclick = submitAdminLogin;
  root.querySelector('#adminCodeInput').onkeydown = e=>{ if(e.key==='Enter') submitAdminLogin(); };

  async function reloadSharedData(){
    const btn = root.querySelector('#refreshSharedBtn');
    if(btn){ btn.disabled=true; btn.textContent='טוען…'; }
    try{
      await loadEntries();
      await Promise.all([
        loadQuality().catch(()=>{}),
        loadTargets().catch(()=>{}),
        loadProductionTargets().catch(()=>{}),
        loadPeriodPackagingTargets().catch(()=>{}),
        loadEventsEntries().catch(()=>{})
      ]);
      renderAll();
      applyRoleUI();
      showToast(entries.length ? ('נטענו '+entries.length+' רשומות מהאחסון המשותף') : 'אין עדיין נתוני ייצור באחסון המשותף. יש לטעון את הקובץ פעם אחת במחשב המנהל.');
    }catch(e){
      showToast('לא ניתן לרענן נתונים מהשרת: '+(e.message||e), true);
    }finally{
      if(btn){ btn.disabled=false; btn.textContent='🔄 רענן נתונים'; }
    }
  }
  root.querySelector('#refreshSharedBtn').onclick = reloadSharedData;
  root.querySelector('#addBtn').onclick = ()=>{ if(requireAdmin()) openModal(); };
  const toggleTableBtn = root.querySelector('#toggleTableBtn');
  if(toggleTableBtn){
    toggleTableBtn.onclick = ()=>{ tableExpanded = !tableExpanded; renderAll(); };
  }
  root.querySelector('#advancedDashboardBtn').onclick = ()=>{ showAdvancedDashboard = !showAdvancedDashboard; root.querySelector('#advancedDashboardBtn').textContent = showAdvancedDashboard ? '📊 הסתר דשבורד חדש' : '📊 דשבורד חדש'; renderAll(); if(showAdvancedDashboard){ const el = root.querySelector('#advancedDashboard'); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); } };
  root.querySelector('#excelAnalyzedExportBtn').onclick = exportAnalyzedDataToExcel;
  root.querySelector('#modalCancel').onclick = closeModal;
  root.querySelector('#modalSave').onclick = saveEntryFromModal;
  root.querySelector('#modalOverlay').onclick = (e)=>{ if(e.target.id==='modalOverlay') closeModal(); };
  root.querySelector('#m_facility').onchange = updateTargetPreviews;
  root.querySelector('#m_shift').onchange = updateTargetPreviews;
  root.querySelector('#m_ptype').onchange = updateTargetPreviews;
  root.querySelector('#targetsBtn').onclick = ()=>{ if(requireAdmin()) openTargetsModal(); };
  root.querySelector('#targetsCancel').onclick = closeTargetsModal;
  root.querySelector('#targetsSave').onclick = saveTargetsFromModal;
  root.querySelector('#targetsOverlay').onclick = (e)=>{ if(e.target.id==='targetsOverlay') closeTargetsModal(); };
  root.querySelector('#targetsTable').addEventListener('input', (e)=>{
    if(e.target.classList.contains('tgt-input')) recalcTargetsTotal(e.target.dataset.ptype);
  });
  root.querySelector('#tgt_facility_select').onchange = (e)=> populateTargetsTableFor(e.target.value);
  root.querySelector('#targetsRemoveOverride').onclick = removeTargetsOverride;
  root.querySelector('#targetsProdBtn').onclick = ()=>{ if(requireAdmin()) openProdTargetsModal(); };
  root.querySelector('#targetsProdCancel').onclick = closeProdTargetsModal;
  root.querySelector('#targetsProdSave').onclick = saveProdTargetsFromModal;
  root.querySelector('#targetsProdOverlay').onclick = (e)=>{ if(e.target.id==='targetsProdOverlay') closeProdTargetsModal(); };
  root.querySelector('#targetsProdTable').addEventListener('input', (e)=>{
    if(e.target.classList.contains('tgtp-input')) recalcProdTargetsTotal(e.target.dataset.fac);
  });
  root.querySelector('#csvInput').onchange = (e)=>{ if(!requireAdmin()){e.target.value='';return;} if(e.target.files[0]) handleDataFile(e.target.files[0]); e.target.value=''; };
  root.querySelector('#templateBtn').onclick = downloadTemplate;
root.querySelector('#printBtn').onclick = ()=> window.print();
  root.querySelector('#resetBtn').onclick = async ()=>{
    if(!requireAdmin()) return;
    const ok1 = await showConfirm('פעולה זו תמחק את כל הנתונים השמורים לכל המשתמשים. להמשיך?');
    if(!ok1) return;
    entries = [];
    const ok = await persist();
    if(ok) showToast('כל הנתונים אופסו');
    renderAll();
  };


  root.querySelector('#addEventTopBtn').onclick = ()=>{ if(requireAdmin()) openEventModal(); };
  root.querySelector('#eventCancel').onclick = ()=> root.querySelector('#eventOverlay').classList.remove('open');
  root.querySelector('#eventSave').onclick = saveEventFromModal;
  root.querySelector('#eventOverlay').onclick = e=>{ if(e.target===root.querySelector('#eventOverlay')) root.querySelector('#eventOverlay').classList.remove('open'); };

  // quality file input — register immediately so early file selection is never lost
  document.addEventListener('change', function(e){
    if(e.target && e.target.id === 'qualityFileInput'){
      if(!requireAdmin()){ e.target.value=''; return; }
      const file = e.target.files && e.target.files[0];
      if(file) handleQualityFile(file);
      e.target.value = '';
    }
  });

  // Fallback for browsers that do not activate a hidden file input through label-for
  document.addEventListener('click', function(e){
    const lbl = e.target && e.target.closest ? e.target.closest('label[for="qualityFileInput"]') : null;
    if(lbl){
      if(!requireAdmin()) return;
      const inp = document.getElementById('qualityFileInput');
      if(inp){
        e.preventDefault();
        inp.click();
      }
    }
  });

  /* ---------------- init ---------------- */
  (async function init(){
    const statusLine = ()=>{
      const el = root.querySelector('#dataStatusLine');
      if(el) el.textContent = 'ייצור: '+entries.length+' | איכות: '+qualityEntries.length+' שורות | '+(_netlifyAvailable?'🟢 Netlify':'🟡 מקומי');
    };

    await loadEntries(); statusLine();
    // Load targets from localStorage immediately (non-blocking)
    try { await Promise.race([ loadTargets(), new Promise(r=>setTimeout(r,3000)) ]); } catch(e){}
    try { await Promise.race([ loadProductionTargets(), new Promise(r=>setTimeout(r,2000)) ]); } catch(e){}
    try { await Promise.race([ loadPeriodPackagingTargets(), new Promise(r=>setTimeout(r,2000)) ]); } catch(e){}
    try { await Promise.race([ loadEventsEntries(), new Promise(r=>setTimeout(r,2000)) ]); } catch(e){}
    // Load quality silently in background
    loadQuality().then(statusLine).catch(()=>{});
    renderAll();
    applyRoleUI();
  
  // whatsapp delegated export
  document.addEventListener('click', function(e){
    const btn = e.target && e.target.closest ? e.target.closest('#whatsappExportBtn') : null;
    if(btn) exportToWhatsApp();
  });


  // whatsapp image delegated export
  document.addEventListener('click', function(e){
    const btn = e.target && e.target.closest ? e.target.closest('#whatsappImageExportBtn') : null;
    if(btn) exportDashboardImageToWhatsApp();
  });

})();
})();

  // V4-general-table-fix
